<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatty</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .messages { scrollbar-width: thin; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #52525b; border-radius: 20px; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

<div class="flex h-screen">
  <!-- Sidebar -->
  <div class="w-80 bg-zinc-900 border-r border-zinc-800 flex flex-col">
    <div class="p-6 border-b border-zinc-800">
      <h1 class="text-3xl font-semibold tracking-tight">Chatty</h1>
      <p class="text-zinc-500 text-sm mt-1">Simple • Real-time • Friends</p>
    </div>

    <div class="p-6">
      <input id="username" type="text" 
             class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-sky-500"
             placeholder="Your display name">
      <button onclick="setUsername()" 
              class="mt-3 w-full bg-sky-600 hover:bg-sky-500 transition-colors py-3.5 rounded-2xl font-medium">
        Set Name
      </button>
    </div>

    <div class="px-6">
      <div onclick="switchRoom('global')" 
           class="flex items-center gap-4 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer transition-colors">
        <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-xl">🌍</div>
        <div>
          <div class="font-medium">Global Chat</div>
          <div class="text-xs text-zinc-500">Everyone</div>
        </div>
      </div>
    </div>

    <div class="px-6 mt-8">
      <div class="text-xs uppercase tracking-widest text-zinc-500 mb-3 px-5">Friends</div>
      <div class="flex gap-2 px-5">
        <input id="addFriend" type="text" placeholder="Username"
               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-sky-500">
        <button onclick="addFriend()" 
                class="bg-zinc-800 hover:bg-zinc-700 px-6 rounded-2xl font-medium transition">Add</button>
      </div>
      <div id="friendsList" class="mt-6 space-y-2"></div>
    </div>

    <div class="mt-auto p-6 border-t border-zinc-800">
      <button onclick="showAdminPanel()" 
              class="w-full py-4 bg-red-600/10 hover:bg-red-600/20 text-red-400 rounded-2xl font-medium transition flex items-center justify-center gap-2">
        ⚙️ Admin Panel
      </button>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="flex-1 flex flex-col">
    <div class="h-16 bg-zinc-900 border-b border-zinc-800 flex items-center px-8">
      <div id="roomTitle" class="font-semibold text-xl">Global Chat</div>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-8 space-y-8 messages bg-zinc-950"></div>

    <div class="p-6 bg-zinc-900 border-t border-zinc-800">
      <div class="flex gap-4">
        <input id="messageInput" type="text" 
               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-7 py-4 text-base focus:outline-none focus:border-sky-500"
               placeholder="Type your message here..." 
               onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()" 
                class="bg-sky-600 hover:bg-sky-500 px-10 rounded-3xl font-semibold transition">
          Send
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div id="overlay" class="hidden fixed inset-0 bg-black/80 z-50"></div>
<div id="adminModal" class="hidden fixed inset-0 flex items-center justify-center z-50">
  <div class="bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-md mx-4 p-8">
    <h2 class="text-2xl font-semibold mb-6">Admin Panel</h2>
    
    <div class="mb-6">
      <p class="text-sm text-zinc-400 mb-2">Password</p>
      <input id="adminPass" type="password" 
             class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-sky-500"
             placeholder="Enter admin password">
    </div>

    <button onclick="verifyAdmin()" 
            class="w-full py-4 bg-white text-zinc-900 font-semibold rounded-2xl hover:bg-zinc-100 transition">
      Access Admin Tools
    </button>

    <div id="adminContent" class="hidden mt-8">
      <input id="targetUser" type="text" placeholder="Target username"
             class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-sky-500">

      <div class="grid grid-cols-3 gap-3">
        <button onclick="banUser()" class="py-3 bg-red-600 hover:bg-red-700 rounded-2xl text-sm font-medium">Ban</button>
        <button onclick="timeoutUser()" class="py-3 bg-amber-600 hover:bg-amber-700 rounded-2xl text-sm font-medium">Timeout 5m</button>
        <button onclick="kickUser()" class="py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-sm font-medium">Kick</button>
      </div>

      <div class="mt-8">
        <p class="text-sm text-zinc-400 mb-3">Recent Global Messages</p>
        <div id="adminMessages" class="max-h-60 overflow-y-auto text-sm space-y-3"></div>
      </div>
    </div>

    <button onclick="hideAdminPanel()" 
            class="mt-8 w-full py-3 text-zinc-400 hover:text-white transition text-sm">Close</button>
  </div>
</div>

<script>
// ================== FIREBASE CONFIG (your exact config) ==================
const firebaseConfig = {
  apiKey: "AIzaSyB-dwq2yjLEUSNZ0UT5oq4-u_KXghysXfw",
  authDomain: "discord2-1ed09.firebaseapp.com",
  databaseURL: "https://discord2-1ed09-default-rtdb.firebaseio.com",
  projectId: "discord2-1ed09",
  storageBucket: "discord2-1ed09.firebasestorage.app",
  messagingSenderId: "856172729472",
  appId: "1:856172729472:web:fa00078f5968d3e30a0265"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================== APP STATE ==================
let currentUser = "Guest" + Math.floor(Math.random() * 9999);
let currentRoom = "global";
let isAdmin = false;
const ADMIN_PASSWORD = "3717";

const bannedUsers = new Set();
const timeouts = new Map();

// ================== CORE FUNCTIONS ==================
function setUsername() {
  const input = document.getElementById("username").value.trim();
  if (input) {
    currentUser = input;
    alert("Name set to: " + currentUser);
  }
}

function addFriend() {
  const friend = document.getElementById("addFriend").value.trim();
  if (!friend || friend === currentUser) return;

  let friends = JSON.parse(localStorage.getItem("friends") || "[]");
  if (!friends.includes(friend)) {
    friends.push(friend);
    localStorage.setItem("friends", JSON.stringify(friends));
  }
  renderFriends();
  switchRoom(friend);
}

function renderFriends() {
  const list = document.getElementById("friendsList");
  list.innerHTML = "";
  const friends = JSON.parse(localStorage.getItem("friends") || "[]");
  friends.forEach(f => {
    const div = document.createElement("div");
    div.className = "flex items-center gap-4 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer transition";
    div.innerHTML = `
      <div class="w-9 h-9 bg-zinc-700 rounded-2xl flex items-center justify-center text-lg">👤</div>
      <div class="font-medium">${f}</div>
    `;
    div.onclick = () => switchRoom(f);
    list.appendChild(div);
  });
}

function switchRoom(room) {
  currentRoom = room;
  document.getElementById("roomTitle").textContent = room === "global" ? "Global Chat" : `Chat with ${room}`;
  document.getElementById("messages").innerHTML = "";
  loadMessages();
}

function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text) return;

  if (bannedUsers.has(currentUser)) return alert("You are banned.");
  if (timeouts.has(currentUser) && Date.now() < timeouts.get(currentUser)) return alert("You are timed out.");

  // Send once only
  db.ref("chats/" + currentRoom).push({
    user: currentUser,
    text: text,
    timestamp: Date.now()
  });

  input.value = "";
}

function loadMessages() {
  const messagesDiv = document.getElementById("messages");
  const ref = db.ref("chats/" + currentRoom);

  // Clear any previous listeners to prevent duplicates
  ref.off();

  ref.on("child_added", (snapshot) => {
    const msg = snapshot.val();
    if (!msg) return;

    const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const div = document.createElement("div");
    div.className = `flex ${msg.user === currentUser ? "justify-end" : "justify-start"}`;

    div.innerHTML = `
      <div class="${msg.user === currentUser ? 'bg-sky-600 text-white' : 'bg-zinc-800'} max-w-[65%] rounded-3xl px-6 py-3.5">
        <div class="text-xs opacity-75 mb-1 flex items-center gap-2">
          <span class="font-medium">${msg.user}</span>
          <span>${time}</span>
        </div>
        <div class="text-[15px] leading-relaxed">${msg.text}</div>
      </div>
    `;

    if (isAdmin) {
      const delBtn = document.createElement("button");
      delBtn.className = "ml-3 mt-2 text-red-400 text-xl opacity-0 hover:opacity-100 transition";
      delBtn.textContent = "🗑";
      delBtn.onclick = () => db.ref(`chats/${currentRoom}/${snapshot.key}`).remove();
      div.appendChild(delBtn);
    }

    messagesDiv.appendChild(div);
    div.scrollIntoView({ behavior: "smooth" });
  });
}

// ================== ADMIN PANEL ==================
function showAdminPanel() {
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("adminModal").classList.remove("hidden");
  document.getElementById("adminContent").classList.add("hidden");
  document.getElementById("adminPass").value = "";
}

function verifyAdmin() {
  if (document.getElementById("adminPass").value === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById("adminContent").classList.remove("hidden");
    loadAdminMessages();
  } else {
    alert("Incorrect password");
  }
}

function hideAdminPanel() {
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("adminModal").classList.add("hidden");
}

function loadAdminMessages() {
  db.ref("chats/global").limitToLast(25).once("value", (snap) => {
    const container = document.getElementById("adminMessages");
    container.innerHTML = "";
    snap.forEach((child) => {
      const m = child.val();
      const entry = document.createElement("div");
      entry.className = "flex justify-between items-start border-b border-zinc-800 pb-3";
      entry.innerHTML = `
        <div class="flex-1">
          <span class="font-medium">${m.user}</span>: ${m.text}
        </div>
        <button onclick="this.parentElement.remove(); db.ref('chats/global/${child.key}').remove()" 
                class="text-red-400 hover:text-red-300 text-xs">Delete</button>
      `;
      container.appendChild(entry);
    });
  });
}

function banUser() {
  const target = document.getElementById("targetUser").value.trim();
  if (target) {
    bannedUsers.add(target);
    alert(target + " has been banned.");
  }
}

function timeoutUser() {
  const target = document.getElementById("targetUser").value.trim();
  if (target) {
    timeouts.set(target, Date.now() + 300000); // 5 minutes
    alert(target + " timed out for 5 minutes.");
  }
}

function kickUser() {
  const target = document.getElementById("targetUser").value.trim();
  if (target) alert(target + " has been kicked (demo).");
}

// ================== START ==================
window.onload = () => {
  document.getElementById("username").value = currentUser;
  renderFriends();
  switchRoom("global");
};
</script>
</body>
</html>
