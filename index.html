<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--s1:#111118;--s2:#18181f;--s3:#1f1f28;--b1:#252530;--b2:#2d2d3d;--ac:#6c63ff;--ac-dim:rgba(108,99,255,.14);--ac-bdr:rgba(108,99,255,.28);--gr:#2ecc8a;--rd:#ff4f4f;--am:#f5a623;--bl:#4fa3ff;--t1:#ededf5;--t2:#8888aa;--t3:#4a4a66;--sw:260px;}
html,body{height:100%;font-family:'Sora',sans-serif;background:var(--bg);color:var(--t1);overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
.app{display:flex;height:100vh;position:relative}

/* SIDEBAR & MOBILE */
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;height:100%;z-index:20;transition:transform .25s cubic-bezier(.4,0,.2,1);flex-shrink:0;}
.mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);z-index:15;opacity:0;transition:opacity .25s;}
.mob-ov.open{display:block;opacity:1;}
.ham{display:none;background:none;border:none;color:var(--t1);font-size:20px;cursor:pointer;margin-right:12px;padding:4px;}

@media (max-width: 768px) {
  .ham{display:block;}
  .sidebar{position:absolute;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.5);}
  .sidebar.open{transform:translateX(0);}
  .msg-acts{opacity:1 !important; pointer-events:all !important; position:relative; top:0; right:0; background:transparent; border:none; box-shadow:none; margin-top:4px;}
  .msg-wrap{flex-direction:column;}
}

.sb-head{padding:16px 14px 13px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:32px;height:32px;border-radius:9px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;box-shadow:0 0 16px rgba(108,99,255,.35);flex-shrink:0}
.logo-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.sb-scroll{flex:1;overflow-y:auto;padding:12px 10px}
.sb-sec{margin-bottom:20px}
.sb-lbl{font-size:9px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--t3);padding:0 6px;margin-bottom:7px;display:block}
.sb-row{display:flex;align-items:center;gap:4px;margin-bottom:7px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);transition:all .14s;position:relative;user-select:none;width:100%;border:none;background:none;font-family:'Sora',sans-serif;text-align:left}
.nav-item:hover{background:var(--s3);color:var(--t1)}
.nav-item.active{background:var(--ac-dim);color:var(--ac)}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:55%;background:var(--ac);border-radius:99px}
.ic-btn{width:25px;height:25px;border-radius:7px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0}
.ic-btn:hover{background:var(--s3);color:var(--t1)}
.sb-foot{padding:11px 10px;border-top:1px solid var(--b1);flex-shrink:0}
.me-bar{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;background:var(--s2);margin-bottom:8px}
.me-av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;box-shadow:0 0 10px rgba(108,99,255,.25);overflow:hidden;}
.me-name{font-size:12.5px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.me-status{font-size:10px;color:var(--gr);transition:color .2s}
.admin-sb{width:100%;padding:8px;border-radius:9px;background:rgba(255,79,79,.07);border:1px solid rgba(255,79,79,.17);color:var(--rd);font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .14s}
.admin-sb:hover{background:rgba(255,79,79,.14)}
.si{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;min-width:0;transition:border-color .14s}
.si:focus{border-color:var(--ac)}
.si-btn{padding:7px 10px;border-radius:8px;background:var(--s3);border:1px solid var(--b2);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .14s;white-space:nowrap;flex-shrink:0}
.si-btn:hover{color:var(--t1)}

/* MESSAGES & CONTENT */
.msgs{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:0}
.msg-wrap{display:flex;gap:10px;padding:5px 8px;border-radius:10px;transition:background .12s;position:relative;align-items:flex-start}
.msg-wrap:hover{background:var(--s2)}
.msg-wrap:hover .msg-acts{opacity:1;pointer-events:all}
.msg-av{width:34px;height:34px;border-radius:9px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;overflow:hidden;}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.msg-name{font-size:13px;font-weight:600}
.msg-time{font-size:10px;color:var(--t3)}
.msg-text{font-size:13.5px;line-height:1.55;color:var(--t1);word-break:break-word;white-space:pre-wrap;display:block}
.msg-media{max-width:250px; border-radius:8px; margin-top:6px; display:block; border:1px solid var(--b2); cursor:pointer;}
.msg-acts{position:absolute;right:8px;top:-14px;background:var(--s1);border:1px solid var(--b2);border-radius:9px;display:flex;gap:1px;padding:3px;opacity:0;pointer-events:none;transition:opacity .13s;z-index:5;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.ma{width:27px;height:27px;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .13s}
.ma:hover{background:var(--s3);color:var(--t1)}
.ma.rd:hover{background:rgba(255,79,79,.15);color:var(--rd)}

/* MODALS & ADMIN */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:18px;width:100%;max-width:410px;padding:26px;box-shadow:0 28px 70px rgba(0,0,0,.6);animation:mIn .2s cubic-bezier(.34,1.56,.64,1)}
.a-ucard{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:11px 13px;margin-bottom:10px;display:flex;gap:10px;align-items:center;}
.sdot{width:7px;height:7px;border-radius:99px;flex-shrink:0}
.sd-ok{background:var(--gr)}.sd-ban{background:var(--rd)}.sd-to{background:var(--am)}
.a-lbl{font-size:9.5px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:var(--t3);margin:15px 0 8px;display:block}
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.abtn{padding:9px 6px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;border:none;transition:opacity .14s}
.abtn:hover{opacity:.78}

@keyframes tIn{from{opacity:0;transform:translateX(12px)}}
@keyframes mIn{from{opacity:0;transform:scale(.94) translateY(8px)}}
</style>
</head>

<script>
// FIREBASE CONFIG
const FC={apiKey:"AIzaSyB-dwq2yjLEUSNZ0UT5oq4-u_KXghysXfw",authDomain:"discord2-1ed09.firebaseapp.com",databaseURL:"https://discord2-1ed09-default-rtdb.firebaseio.com",projectId:"discord2-1ed09",storageBucket:"discord2-1ed09.appspot.com",messagingSenderId:"856172729472",appId:"1:856172729472:web:fa00078f5968d3e30a0265"};
firebase.initializeApp(FC); const db=firebase.database(); const storage=firebase.storage();

// STATE
let me=null, myDisplayName=null, myPfp="", room='global', msgRef=null, adminRole=null, isChatLocked=false, isGhostMode=false, myBlockedUsers={}, typeTimer=null;
const ADMIN_PW='32ad', MOD_PW='31mod', LITTLE_MOD_PW='12tmod';

function getHWID(){let id=localStorage.getItem('_chwid');if(!id){id='hw_'+Math.random().toString(36).substr(2,9);localStorage.setItem('_chwid',id);}return id;}
const HWID=getHWID();
async function isHWBanned(){try{const s=await db.ref('hwbans/'+btoa(HWID).replace(/[=+/]/g,c=>({'=':'','+':`-`,'/':'_'}[c]))).once('value');return s.exists();}catch{return false;}}

const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
function simpleHash(s){let h=5381;for(let i=0;i<s.length;i++){h=((h<<5)+h)+s.charCodeAt(i);h|=0;}return 'h'+Math.abs(h).toString(36);}
function uCol(n){const c=['#6c63ff','#2ecc8a','#f5a623','#ff5f5f','#4fa3ff','#d06ef7','#6ef7c2'];return c[n?n.charCodeAt(0)%c.length:0];}
function fmt(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function toast(msg,type='info'){ const el=document.createElement('div');el.className='toast '+type; el.innerHTML=`<span>${msg}</span>`; document.getElementById('toasts').appendChild(el); setTimeout(()=>{el.style.opacity=0;setTimeout(()=>el.remove(),400);},3000); }

// AUTH
async function doLogin(){ const u=document.getElementById('li-u').value.trim().toLowerCase().replace(/[\.\#\$\[\]]/g,'_'), p=document.getElementById('li-p').value; if(await isHWBanned())return alert("Banned"); const s=await db.ref('users/'+u).once('value'); if(!s.exists()||s.val().password!==simpleHash(p))return alert("Invalid"); me=u; myDisplayName=s.val().displayName; myPfp=s.val().pfp||""; localStorage.setItem('chatty_user',u); onLoggedIn(); }
async function doRegister(){ const d=document.getElementById('ri-d').value.trim(), e=document.getElementById('ri-u').value.trim().toLowerCase(), p=document.getElementById('ri-p').value; const u=e.replace(/[\.\#\$\[\]]/g,'_'); if(await isHWBanned())return alert("Banned"); await db.ref('users/'+u).set({username:u,displayName:d,password:simpleHash(p),ts:Date.now(),hwid:HWID,role:null}); me=u; myDisplayName=d; localStorage.setItem('chatty_user',u); onLoggedIn(); }
function onLoggedIn(){ document.getElementById('authOv').classList.remove('open'); document.getElementById('mainApp').style.display='flex'; updateSidebarProfile(); switchRoom('global'); db.ref('users/'+me).on('value',s=>{ const d=s.val(); if(!d)return; myDisplayName=d.displayName; myPfp=d.pfp||""; isGhostMode=d.ghostMode||false; if(d.pendingWarnReason){document.getElementById('warnReasonTxt').textContent=d.pendingWarnReason;document.getElementById('warnOv').classList.add('open');}}); loadFriends(); loadServers(); }
function signOut(){ localStorage.removeItem('chatty_user'); location.reload(); }
function updateSidebarProfile(){ const av=document.getElementById('meAv'); av.textContent=myDisplayName[0]; av.style.background=uCol(me); document.getElementById('meName').textContent=myDisplayName; }

// ADMIN LOGIC
function isSuperAdmin(){ return adminRole==='admin'&&me&&me.toLowerCase().includes('zasingl61'); }

async function showAdmin(){
  document.getElementById('adminOv').classList.add('open');
  const snap = await db.ref('users/'+me+'/role').once('value');
  const role = snap.val();
  
  if(role) {
    // AUTO UNLOCK if they have a role in the database
    adminRole = role;
    setupAdminUI();
  } else {
    document.getElementById('aLock').style.display='block';
    document.getElementById('aCont').style.display='none';
  }
}

function verifyAdmin(){
  const pw = document.getElementById('a-pw').value;
  if(pw === ADMIN_PW) adminRole = 'admin';
  else if(pw === MOD_PW) adminRole = 'mod';
  else if(pw === LITTLE_MOD_PW) adminRole = 'little_mod';
  else return alert("Invalid Code");
  setupAdminUI();
}

function setupAdminUI(){
  document.getElementById('aLock').style.display='none';
  document.getElementById('aCont').style.display='block';
  document.getElementById('admin-only-tools').style.display = (adminRole==='admin') ? 'block' : 'none';
  document.getElementById('supreme-user-tools').style.display = isSuperAdmin() ? 'block' : 'none';
  
  // HIDE BAN BUTTONS FOR MODS/T-MODS
  const banButtons = document.querySelectorAll('.btn-ban-only');
  banButtons.forEach(btn => {
    btn.style.display = (adminRole === 'admin') ? 'block' : 'none';
  });
  
  loadAdminUsers();
}

async function loadAdminUsers(){ const sel=document.getElementById('a-sel'); sel.innerHTML='<option value="">— select user —</option>'; (await db.ref('users').once('value')).forEach(c=>{ const u=c.val(), opt=document.createElement('option'); opt.value=c.key; opt.textContent=(u.displayName||c.key)+(u.role?' ['+u.role+']':''); sel.appendChild(opt); }); }
async function loadAUser(){ const u=document.getElementById('a-sel').value; if(!u)return; document.getElementById('a-card').style.display='flex'; document.getElementById('a-actions').style.display='block'; const d=(await db.ref('users/'+u).once('value')).val(); document.getElementById('a-card').innerHTML=`<div class="fr-av" style="background:${uCol(u)}">${(d.displayName||u)[0]}</div><div><b>${esc(d.displayName)}</b><br><small>${u}</small></div>`; }

function hideAdmin(){ document.getElementById('adminOv').classList.remove('open'); }
async function adminWarn(m){ const u=document.getElementById('a-sel').value; const r=prompt("Reason:"); await db.ref('users/'+u).update({pendingWarnReason:r,pendingWarnPenalty:m}); }
async function adminTO(min){ const u=document.getElementById('a-sel').value; await db.ref('users/'+u).update({timeoutUntil:Date.now()+(min*60000)}); toast('Muted','warn'); }
async function adminBan(){ const u=document.getElementById('a-sel').value; await db.ref('users/'+u).update({banned:true}); }
async function adminHWBan(){ const u=document.getElementById('a-sel').value; const d=(await db.ref('users/'+u).once('value')).val(); await db.ref('hwbans/'+btoa(d.hwid)).set({hwid:d.hwid}); await db.ref('users/'+u).update({banned:true}); }
async function adminUnban(){ const u=document.getElementById('a-sel').value; await db.ref('users/'+u).update({banned:false,timeoutUntil:0,pendingWarnReason:null}); }
async function adminSetRole(r){ const u=document.getElementById('a-sel').value; await db.ref('users/'+u).update({role:r}); toast('Role Set','ok'); loadAdminUsers(); }
async function adminBroadcast(){ const m=prompt("Announcement:"); await db.ref('server_meta/broadcast').set({text:m,ts:Date.now()}); }
async function adminSysMsg(){ const m=prompt("System Alert:"); await db.ref('chats/'+room).push({sys:true,text:'🛡️ SYSTEM: '+m,ts:Date.now()}); }
async function adminToggleLock(){ await db.ref('server_meta/chatLocked').set(!isChatLocked); }
async function toggleGhostMode(){ await db.ref('users/'+me).update({ghostMode:!isGhostMode}); }
function acceptWarn(){ db.ref('users/'+me).update({pendingWarnReason:null}); document.getElementById('warnOv').classList.remove('open'); }

// MESSAGING
function switchRoom(id){
  if(msgRef) { db.ref('chats/'+room).off(); db.ref('typing/'+room).off(); } 
  room=id; document.getElementById('msgs').innerHTML='';
  
  const iD=document.getElementById('inviteDisplay'), iB=document.getElementById('inviteBtn'), lB=document.getElementById('leaveBtn');
  if(id.startsWith('srv_')){ iD.style.display='block'; iD.textContent=id; iB.style.display='block'; lB.style.display='block'; } else { iD.style.display='none'; iB.style.display='none'; lB.style.display='none'; }
  
  msgRef=db.ref('chats/'+room).limitToLast(100);
  msgRef.on('child_added',s=>addMsg(s.key,s.val()));
}

function addMsg(key,msg){
  const box=document.getElementById('msgs');
  const wrap=document.createElement('div'); wrap.className=msg.sys?'sys':'msg-wrap'; wrap.id='msg-'+key;
  if(msg.sys){ wrap.innerHTML=`<span>${esc(msg.text)}</span>`; }
  else {
    let content = msg.deleted?'<i>Deleted</i>':msg.img?`<img src="${msg.img}" class="msg-media">`:`<span class="msg-text">${esc(msg.text)}</span>`;
    wrap.innerHTML=`<div class="msg-av" style="background:${uCol(msg.user)}">${msg.displayName[0]}</div><div class="msg-body"><div class="msg-meta"><b>${esc(msg.displayName)}</b> <small>${fmt(msg.ts)}</small></div>${content}</div>`;
  }
  box.appendChild(wrap); box.scrollTop=box.scrollHeight;
}

async function doSend(){
  const inp=document.getElementById('msgInp'), txt=inp.value.trim(); if(!txt)return;
  await db.ref('chats/'+room).push({user:me,displayName:myDisplayName,text:txt,ts:Date.now()});
  inp.value='';
}

// HELPERS
async function createServer(){ const n=prompt('Name:'); if(!n)return; const id='srv_'+Math.random().toString(36).substr(2,5); await db.ref('rooms/'+id).set({name:n,owner:me}); await db.ref('users/'+me+'/rooms/'+id).set(true); switchRoom(id); }
async function joinServer(){ const id=prompt('Code:'); if(!id)return; await db.ref('users/'+me+'/rooms/'+id).set(true); switchRoom(id); }
function loadServers(){ db.ref('users/'+me+'/rooms').on('value',s=>{ const l=document.getElementById('serversList'); l.innerHTML=''; s.forEach(async c=>{ const d=(await db.ref('rooms/'+c.key).once('value')).val(); if(!d)return; const b=document.createElement('button'); b.className='nav-item'; b.innerHTML=`<div class="fr-av" style="background:${uCol(c.key)}">${d.name[0]}</div>${d.name}`; b.onclick=()=>switchRoom(c.key); l.appendChild(b); }); }); }
function onKey(e){if(e.key==='Enter')doSend();}
function onType(){}
function mobToggle(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('mobOv').classList.toggle('open'); }
function showReg(){ document.getElementById('loginBox').style.display='none'; document.getElementById('regBox').style.display='block'; }
function showLogin(){ document.getElementById('regBox').style.display='none'; document.getElementById('loginBox').style.display='block'; }
window.onload=()=>{ const u=localStorage.getItem('chatty_user'); if(u){me=u; db.ref('users/'+u).once('value',s=>{ if(s.exists()){myDisplayName=s.val().displayName; onLoggedIn(); }}); } else { document.getElementById('authOv').classList.add('open'); } };
</script>
