<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatty</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#18181f;--s3:#1f1f28;
  --b1:#252530;--b2:#2d2d3d;
  --ac:#6c63ff;--ac-dim:rgba(108,99,255,.14);--ac-bdr:rgba(108,99,255,.28);
  --gr:#2ecc8a;--rd:#ff4f4f;--am:#f5a623;--bl:#4fa3ff;
  --t1:#ededf5;--t2:#8888aa;--t3:#4a4a66;
  --sw:260px;
}
html,body{height:100%;font-family:'Sora',sans-serif;background:var(--bg);color:var(--t1);overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}

/* LAYOUT */
.app{display:flex;height:100vh;position:relative}

/* SIDEBAR */
.sidebar{
  width:var(--sw);min-width:var(--sw);background:var(--s1);
  border-right:1px solid var(--b1);display:flex;flex-direction:column;
  height:100%;z-index:10;transition:transform .25s ease;flex-shrink:0;
}
.sb-head{padding:16px 14px 13px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:32px;height:32px;border-radius:9px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;box-shadow:0 0 16px rgba(108,99,255,.35);flex-shrink:0}
.logo-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.sb-scroll{flex:1;overflow-y:auto;padding:12px 10px}
.sb-sec{margin-bottom:20px}
.sb-lbl{font-size:9px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--t3);padding:0 6px;margin-bottom:7px;display:block}
.sb-row{display:flex;align-items:center;gap:4px;margin-bottom:7px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);transition:all .14s;position:relative;user-select:none;width:100%;border:none;background:none;font-family:'Sora',sans-serif;text-align:left}
.nav-item:hover{background:var(--s3);color:var(--t1)}
.nav-item.active{background:var(--ac-dim);color:var(--ac)}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:55%;background:var(--ac);border-radius:99px}
.nav-ic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ic-btn{width:25px;height:25px;border-radius:7px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0}
.ic-btn:hover{background:var(--s3);color:var(--t1)}
.sb-foot{padding:11px 10px;border-top:1px solid var(--b1);flex-shrink:0}
.me-bar{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;background:var(--s2);margin-bottom:8px}
.me-av{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;box-shadow:0 0 10px rgba(108,99,255,.25);overflow:hidden;object-fit:cover;}
.me-name{font-size:12.5px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.me-status{font-size:10px;color:var(--gr)}
.admin-sb{width:100%;padding:8px;border-radius:9px;background:rgba(255,79,79,.07);border:1px solid rgba(255,79,79,.17);color:var(--rd);font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .14s}
.admin-sb:hover{background:rgba(255,79,79,.14)}
.si{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;min-width:0;transition:border-color .14s}
.si:focus{border-color:var(--ac)}
.si::placeholder{color:var(--t3)}
.si-btn{padding:7px 10px;border-radius:8px;background:var(--s3);border:1px solid var(--b2);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .14s;white-space:nowrap;flex-shrink:0}
.si-btn:hover{color:var(--t1)}
.fr-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;cursor:pointer;transition:all .14s;width:100%;border:none;background:none;font-family:'Sora',sans-serif;text-align:left}
.fr-item:hover{background:var(--s2)}
.fr-av{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden;}
.fr-name{font-size:12.5px;font-weight:500;color:var(--t2)}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0; position:relative;}
.chat-head{height:54px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.ch-ic{font-size:17px}
.ch-title{font-size:14.5px;font-weight:600;letter-spacing:-.2px}
.ch-sub{font-size:11px;color:var(--t2);margin-top:1px}
.msgs{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:0}
.msg-wrap{display:flex;gap:9px;padding:5px 8px;border-radius:10px;transition:background .12s;position:relative;align-items:flex-start}
.msg-wrap:hover{background:var(--s2)}
.msg-av{width:30px;height:30px;border-radius:9px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;object-fit:cover;overflow:hidden;}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.msg-name{font-size:13px;font-weight:600}
.msg-time{font-size:10px;color:var(--t3)}
.msg-text{font-size:13.5px;line-height:1.55;color:var(--t1);word-break:break-word;white-space:pre-wrap;display:block}
.msg-gif{max-width:250px; border-radius:8px; margin-top:6px; display:block; border:1px solid var(--b2);}

/* GIF MENU */
.gif-menu{position:absolute; bottom:80px; left:20px; right:20px; max-width:400px; background:var(--s1); border:1px solid var(--b2); border-radius:14px; padding:14px; box-shadow:0 10px 40px rgba(0,0,0,.5); display:none; flex-direction:column; gap:10px; z-index:20;}
.gif-menu.open{display:flex; animation:mIn .2s cubic-bezier(.34,1.56,.64,1);}
.gif-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:220px; overflow-y:auto; padding-right:4px;}
.gif-item{width:100%; height:100px; object-fit:cover; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:border .14s;}
.gif-item:hover{border-color:var(--ac);}

/* INPUT */
.input-zone{padding:13px 18px;background:var(--s1);border-top:1px solid var(--b1);flex-shrink:0}
.inp-row{display:flex;gap:8px;align-items:center}
.gif-btn{width:44px; height:44px; border-radius:12px; background:var(--s3); border:1px solid var(--b2); color:var(--t2); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:14px; font-weight:700; transition:all .14s}
.m-input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:11px 16px;font-size:13.5px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;transition:border-color .14s;height:44px}
.m-input:focus{border-color:var(--ac)}
.send-btn{width:44px;height:44px;border-radius:12px;background:var(--ac);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 16px rgba(108,99,255,.28);transition:all .14s}

/* MODALS */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:18px;width:100%;max-width:410px;padding:26px;box-shadow:0 28px 70px rgba(0,0,0,.6);animation:mIn .2s cubic-bezier(.34,1.56,.64,1)}
.m-title{font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px}
.fi{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:11px 14px;font-size:13.5px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;margin-bottom:13px;transition:border-color .14s}
.mbtn{width:100%;padding:12px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;border:none;transition:all .14s;margin-bottom:8px;background:var(--ac);color:#fff}

@keyframes mIn{from{opacity:0;transform:scale(.94) translateY(8px)}}
</style>
</head>
<body>

<div id="toasts"></div>
<button class="ham" id="ham" onclick="mobToggle()">☰</button>
<div class="mob-ov" id="mobOv" onclick="mobToggle()"></div>

<div class="ov open" id="authOv">
  <div class="modal" id="loginBox">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <div class="logo">C</div>
      <div class="m-title">Welcome back</div>
    </div>
    <input class="fi" id="li-u" type="email" placeholder="you@hatboro-horsham.org">
    <input class="fi" id="li-p" type="password" placeholder="••••••••" onkeypress="if(event.key==='Enter')doLogin()">
    <div id="li-err" style="color:var(--rd); font-size:12px; display:none; margin-bottom:10px"></div>
    <button class="mbtn" onclick="doLogin()">Sign In →</button>
    <div style="text-align:center; font-size:12px">No account? <a onclick="showReg()" style="color:var(--ac); cursor:pointer">Create one</a></div>
  </div>
  <div class="modal" id="regBox" style="display:none">
    <div class="m-title">Join Chatty</div>
    <input class="fi" id="ri-d" type="text" placeholder="Display Name">
    <input class="fi" id="ri-u" type="email" placeholder="you@hatboro-horsham.org">
    <input class="fi" id="ri-p" type="password" placeholder="At least 6 chars">
    <input class="fi" id="ri-p2" type="password" placeholder="Repeat password" onkeypress="if(event.key==='Enter')doRegister()">
    <div id="ri-err" style="color:var(--rd); font-size:12px; display:none; margin-bottom:10px"></div>
    <button class="mbtn" onclick="doRegister()">Create Account →</button>
    <div style="text-align:center; font-size:12px">Have an account? <a onclick="showLogin()" style="color:var(--ac); cursor:pointer">Sign in</a></div>
  </div>
</div>

<div class="ov" id="profileOv">
  <div class="modal">
    <div class="m-title">👤 Edit Profile</div>
    <input class="fi" id="ep-d" type="text" placeholder="Your display name">
    <input class="fi" id="ep-pfp" type="url" placeholder="PFP Image URL">
    <button class="mbtn" onclick="saveProfile()">Save Changes</button>
    <button class="mbtn" onclick="hideProfile()" style="background:var(--s3); color:var(--t2)">Cancel</button>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sb-head"><div class="logo">C</div><span class="logo-name">Chatty</span></div>
    <div class="sb-scroll">
      <div class="sb-sec"><span class="sb-lbl">Channels</span><button class="nav-item active">🌐 Global Chat</button></div>
    </div>
    <div class="sb-foot">
      <div class="me-bar">
        <div class="me-av" id="meAv">?</div>
        <div class="me-name" id="meName">—</div>
        <button class="ic-btn" onclick="showProfile()">✏️</button>
      </div>
      <button class="admin-sb" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div class="chat">
    <div class="chat-head">
      <div class="ch-title">🌐 Global Chat</div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="gif-menu" id="gifMenu">
      <input class="fi" id="gifSearchInp" placeholder="Search Giphy..." onkeyup="if(event.key==='Enter')searchGifs()">
      <div class="gif-grid" id="gifGrid"></div>
    </div>
    <div class="input-zone">
      <div class="inp-row">
        <button class="gif-btn" onclick="toggleGifMenu()">GIF</button>
        <input class="m-input" id="msgInp" placeholder="Message..." onkeydown="if(event.key==='Enter')sendOrEdit()">
        <button class="send-btn" onclick="sendOrEdit()">🚀</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── FIREBASE ──────────────────────────────────
const FC={apiKey:"AIzaSyB-dwq2yjLEUSNZ0UT5oq4-u_KXghysXfw",authDomain:"discord2-1ed09.firebaseapp.com",databaseURL:"https://discord2-1ed09-default-rtdb.firebaseio.com",projectId:"discord2-1ed09",storageBucket:"discord2-1ed09.firebasestorage.app",messagingSenderId:"856172729472",appId:"1:856172729472:web:fa00078f5968d3e30a0265"};
firebase.initializeApp(FC);
const db=firebase.database();

// ── STATE ─────────────────────────────────────
let me=null, myDisplayName=null, myPfp="", room='global', msgRef=null, roomJoinTime=0;
const ADMIN_PW='112111';
const COLORS=['#6c63ff','#2ecc8a','#f5a623','#ff5f5f','#4fa3ff','#d06ef7','#6ef7c2'];

// ── ADVANCED CENSOR ───────────────────────────
const BAD=['fuck','shit','bitch','cunt','dick','pussy','bastard','nigger','nigga','faggot','fag','retard','whore','slut','cock','asshole','motherfucker','kys','rape','rapist','pedophile','pedo','nazi'];
function censor(t) {
  let o = t, hit = false;
  BAD.forEach(w => {
    const charMap = {'a':'[a@4]','e':'[e3]','i':'[i1!l]','o':'[o0]','s':'[s$5]','t':'[t7+]','c':'[c\\(k]','u':'[uv]','l':'[l1I]'};
    let rxStr = w.split('').map(c => charMap[c] || c).join('[\\s\\W_]*');
    const rx = new RegExp(rxStr, 'gi');
    if (rx.test(o)) { hit = true; o = o.replace(rx, m => '█'.repeat(m.length)); }
  });
  return {text: o, censored: hit};
}

const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
function simpleHash(s){let h=5381;for(let i=0;i<s.length;i++){h=((h<<5)+h)+s.charCodeAt(i);h|=0;}return 'h'+Math.abs(h).toString(36);}
function uCol(n){return COLORS[n?n.charCodeAt(0)%COLORS.length:0];}
function fmt(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

// ── AUTH ──
window.onload = async () => {
  const savedUser = localStorage.getItem('chatty_user');
  if (savedUser) {
    const snap = await db.ref('users/' + savedUser).once('value');
    if (snap.exists()) {
      const d = snap.val();
      me = savedUser; myDisplayName = d.displayName || savedUser; myPfp = d.pfp || "";
      onLoggedIn();
    }
  }
};

async function doLogin(){
  const email = document.getElementById('li-u').value.trim().toLowerCase();
  const p = document.getElementById('li-p').value;
  if(!email.endsWith('@hatboro-horsham.org')){alert("Must use school email"); return;}
  const u = email.replace('@hatboro-horsham.org', '').replace(/\./g, '_');
  const snap=await db.ref('users/'+u).once('value');
  if(!snap.exists() || snap.val().password !== simpleHash(p)){alert("Invalid Login"); return;}
  me=u; myDisplayName=snap.val().displayName; myPfp=snap.val().pfp;
  localStorage.setItem('chatty_user', u); onLoggedIn();
}

async function doRegister(){
  const dName=document.getElementById('ri-d').value.trim();
  const email=document.getElementById('ri-u').value.trim().toLowerCase();
  const p=document.getElementById('ri-p').value;
  if(!email.endsWith('@hatboro-horsham.org') || p.length < 6){alert("Invalid Registry"); return;}
  const u = email.replace('@hatboro-horsham.org','').replace(/\./g,'_');
  await db.ref('users/'+u).set({username:u, displayName:dName, pfp:"", password:simpleHash(p), ts:Date.now()});
  me=u; myDisplayName=dName; localStorage.setItem('chatty_user',u); onLoggedIn();
}

function onLoggedIn(){
  document.getElementById('authOv').classList.remove('open');
  document.getElementById('mainApp').style.display='flex';
  updateSidebarProfile(); switchRoom('global');
}

function updateSidebarProfile() {
  const av=document.getElementById('meAv');
  if(myPfp) av.innerHTML=`<img src="${esc(myPfp)}">`; 
  else { av.textContent=myDisplayName[0].toUpperCase(); av.style.background=uCol(me); }
  document.getElementById('meName').textContent=myDisplayName;
}

function signOut(){ localStorage.removeItem('chatty_user'); location.reload(); }
function showProfile(){ document.getElementById('profileOv').classList.add('open'); }
function hideProfile(){ document.getElementById('profileOv').classList.remove('open'); }
async function saveProfile(){
  const n=document.getElementById('ep-d').value.trim(), p=document.getElementById('ep-pfp').value.trim();
  await db.ref('users/'+me).update({displayName:n, pfp:p});
  myDisplayName=n; myPfp=p; updateSidebarProfile(); hideProfile();
}

// ── GIPHY ──
function toggleGifMenu(){ document.getElementById('gifMenu').classList.toggle('open'); }
async function searchGifs() {
  const q=document.getElementById('gifSearchInp').value;
  const apiKey='P5hgFIPg3F1AIqXVdUTVIoq4p7A4DJFn'; // Your Key Integrated
  const url=q?`https://api.giphy.com/v1/gifs/search?api_key=${apiKey}&q=${q}&limit=8&rating=pg-13`:`https://api.giphy.com/v1/gifs/trending?api_key=${apiKey}&limit=8&rating=pg-13`;
  const res=await fetch(url); const data=await res.json();
  const grid=document.getElementById('gifGrid'); grid.innerHTML='';
  data.data.forEach(g=>{
    const img=document.createElement('img'); img.src=g.images.fixed_height.url; img.className='gif-item';
    img.onclick=()=>sendGif(g.images.fixed_height.url); grid.appendChild(img);
  });
}
async function sendGif(url){ await db.ref('chats/'+room).push({user:me, displayName:myDisplayName, pfp:myPfp, gif:url, ts:Date.now()}); toggleGifMenu(); }

// ── MESSAGES ──
function switchRoom(id){
  if(msgRef) db.ref('chats/'+room).off(); room=id; roomJoinTime=Date.now();
  document.getElementById('msgs').innerHTML='';
  msgRef=db.ref('chats/'+room).limitToLast(50);
  msgRef.on('child_added',s=>addMsg(s.key,s.val()));
}

function addMsg(key,msg){
  const box=document.getElementById('msgs'); const dName=msg.displayName||msg.user;
  const {text:ct, censored:wc} = censor(msg.text||"");
  let content = msg.gif ? `<img class="msg-gif" src="${msg.gif}">` : `<span class="msg-text">${esc(ct)}</span>`;
  const wrap=document.createElement('div'); wrap.className='msg-wrap';
  wrap.innerHTML=`<div class="msg-av" style="background:${uCol(msg.user)}">${msg.pfp?`<img src="${msg.pfp}">`:dName[0]}</div>
    <div class="msg-body"><div class="msg-meta"><span class="msg-name" style="color:${uCol(msg.user)}">${esc(dName)}</span> <span class="msg-time">${fmt(msg.ts)}</span></div>${content}</div>`;
  box.appendChild(wrap); box.scrollTop=box.scrollHeight;
}

async function doSend(){
  const inp=document.getElementById('msgInp'); const txt=inp.value.trim(); if(!txt)return;
  const {text:ct, censored:wc}=censor(txt);
  await db.ref('chats/'+room).push({user:me, displayName:myDisplayName, pfp:myPfp, text:ct, censored:wc, ts:Date.now()});
  inp.value='';
}
function sendOrEdit(){ doSend(); }
function mobToggle(){ document.getElementById('sidebar').classList.toggle('open'); }
function showReg(){ document.getElementById('loginBox').style.display='none'; document.getElementById('regBox').style.display='block'; }
function showLogin(){ document.getElementById('regBox').style.display='none'; document.getElementById('loginBox').style.display='block'; }
</script>
</body>
</html>
