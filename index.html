<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatty</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #52525b; border-radius: 20px; }
    .sidebar-transition { transition: all 0.3s ease-in-out; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

<div class="flex h-screen overflow-hidden relative">

  <!-- Mobile Hamburger -->
  <button onclick="toggleSidebar()" 
          class="md:hidden fixed top-4 left-4 z-50 bg-zinc-900 p-3 rounded-2xl border border-zinc-700">
    ☰
  </button>

  <!-- Sidebar -->
  <div id="sidebar" class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col h-full fixed md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 sidebar-transition z-40 overflow-y-auto">
    
    <div class="p-5 border-b border-zinc-800 flex items-center gap-3">
      <div class="w-9 h-9 bg-sky-600 rounded-2xl flex items-center justify-center font-bold text-lg">C</div>
      <h1 class="text-2xl font-semibold">Chatty</h1>
    </div>

    <!-- Auth -->
    <div id="authSection" class="p-5 border-b border-zinc-800 transition-all duration-300">
      <div class="space-y-3">
        <input id="usernameInput" type="text" placeholder="Choose username" 
               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-sky-500">
        <input id="email" type="email" placeholder="Email" 
               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-sky-500">
        <input id="password" type="password" placeholder="Password" 
               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-sky-500">
        <div class="flex gap-2">
          <button onclick="register()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-2xl text-sm font-medium">Register</button>
          <button onclick="login()" class="flex-1 bg-sky-600 hover:bg-sky-500 py-3 rounded-2xl text-sm font-medium">Login</button>
        </div>
      </div>
    </div>

    <!-- Servers -->
    <div class="p-5">
      <div class="flex justify-between items-center mb-3">
        <span class="text-xs uppercase tracking-widest text-zinc-500">Servers</span>
        <button onclick="createServer()" class="text-sky-400 text-xl leading-none">+</button>
      </div>
      <div id="serversList" class="space-y-1"></div>
    </div>

    <!-- Friends -->
    <div class="px-5 mt-4">
      <div class="text-xs uppercase tracking-widest text-zinc-500 mb-3">Friends</div>
      <div class="flex gap-2">
        <input id="addFriend" placeholder="Add friend" 
               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
        <button onclick="addFriend()" class="bg-zinc-700 hover:bg-zinc-600 px-5 rounded-2xl">Add</button>
      </div>
      <div id="friendsList" class="mt-4 space-y-1"></div>
    </div>

    <div class="mt-auto p-5 border-t border-zinc-800">
      <button onclick="showAdminPanel()" 
              class="w-full py-3 bg-red-600/10 hover:bg-red-600/20 text-red-400 rounded-2xl text-sm font-medium">Admin Tools</button>
      <button onclick="logout()" id="logoutBtn" class="hidden w-full mt-3 text-red-400 text-sm py-2">Logout</button>
    </div>
  </div>

  <!-- Mobile Overlay -->
  <div id="sidebarOverlay" onclick="toggleSidebar()" 
       class="hidden md:hidden fixed inset-0 bg-black/60 z-30"></div>

  <!-- Main Chat -->
  <div class="flex-1 flex flex-col">
    <div class="h-16 bg-zinc-900 border-b border-zinc-800 flex items-center px-6 md:px-8 justify-between">
      <div id="roomTitle" class="font-semibold text-xl">Global Chat</div>
      <div id="currentUserDisplay" class="text-sm text-zinc-400"></div>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6 messages bg-zinc-950"></div>

    <div class="p-6 bg-zinc-900 border-t border-zinc-800">
      <div class="flex gap-3">
        <input id="messageInput" type="text" placeholder="Type a message..." 
               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 focus:outline-none focus:border-sky-500"
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" class="bg-sky-600 hover:bg-sky-500 px-8 md:px-10 rounded-3xl font-medium">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div id="overlay" class="hidden fixed inset-0 bg-black/70 z-50"></div>
<div id="adminModal" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-lg p-8 z-50">
  <h2 class="text-2xl font-semibold mb-6">Admin Panel</h2>
  
  <div class="mb-6">
    <p class="text-sm text-zinc-400 mb-2">Admin Password</p>
    <input id="adminPass" type="password" placeholder="••••••••" 
           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-red-500">
  </div>

  <button onclick="verifyAdmin()" class="w-full py-4 bg-red-600 hover:bg-red-500 rounded-2xl font-semibold mb-8">Unlock Admin</button>

  <div id="adminContent" class="hidden">
    <label class="block text-sm text-zinc-400 mb-2">Select User</label>
    <select id="userDropdown" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-sm focus:outline-none"></select>

    <div class="mt-6 grid grid-cols-2 gap-3">
      <button onclick="adminBan()" class="py-3 bg-red-600 hover:bg-red-700 rounded-2xl text-sm">Ban</button>
      <button onclick="adminTimeout()" class="py-3 bg-amber-600 hover:bg-amber-700 rounded-2xl text-sm">Timeout 5min</button>
      <button onclick="adminKick()" class="py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-sm">Kick</button>
      <button onclick="adminClearUserMessages()" class="py-3 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-sm">Clear Msgs</button>
    </div>
  </div>

  <button onclick="hideAdminPanel()" class="mt-8 w-full text-zinc-400 hover:text-white py-3 text-sm">Close</button>
</div>

<script>
// ================== FIREBASE CONFIG ==================
const firebaseConfig = {
  apiKey: "AIzaSyB-dwq2yjLEUSNZ0UT5oq4-u_KXghysXfw",
  authDomain: "discord2-1ed09.firebaseapp.com",
  databaseURL: "https://discord2-1ed09-default-rtdb.firebaseio.com",
  projectId: "discord2-1ed09",
  storageBucket: "discord2-1ed09.firebasestorage.app",
  messagingSenderId: "856172729472",
  appId: "1:856172729472:web:fa00078f5968d3e30a0265"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let currentDisplayName = "";
let currentRoom = "global";
let isAdmin = false;
const ADMIN_PASSWORD = "3717";

const bannedUsers = new Set();
const timeouts = new Map();

// Mobile sidebar
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");
  sidebar.classList.toggle("-translate-x-full");
  overlay.classList.toggle("hidden");
}

function closeSidebarOnMobile() {
  if (window.innerWidth < 768) toggleSidebar();
}

// ================== AUTH ==================
function register() {
  const username = document.getElementById("usernameInput").value.trim();
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();
  if (!username || !email || !pass) return alert("Please fill all fields");
  if (username.length < 3) return alert("Username must be at least 3 characters");

  auth.createUserWithEmailAndPassword(email, pass)
    .then(cred => {
      currentUser = cred.user;
      db.ref("users/" + currentUser.uid).set({
        email: email,
        displayName: username,
        lastSeen: Date.now()
      }).then(() => {
        currentDisplayName = username;
        updateUIAfterLogin();
      });
    })
    .catch(err => alert(err.message));
}

function login() {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();
  if (!email || !pass) return alert("Enter email and password");

  auth.signInWithEmailAndPassword(email, pass)
    .then(cred => {
      currentUser = cred.user;
      db.ref("users/" + currentUser.uid).once("value", snap => {
        const data = snap.val() || {};
        currentDisplayName = data.displayName || "User";
        updateUIAfterLogin();
      });
    })
    .catch(err => alert(err.message));
}

function logout() {
  auth.signOut().then(() => {
    currentUser = null;
    currentDisplayName = "";
    document.getElementById("authSection").classList.remove("hidden");
    document.getElementById("logoutBtn").classList.add("hidden");
    document.getElementById("currentUserDisplay").textContent = "";
    switchRoom("global");
  });
}

function updateUIAfterLogin() {
  const authSec = document.getElementById("authSection");
  authSec.style.opacity = "0";
  setTimeout(() => { authSec.classList.add("hidden"); authSec.style.opacity = "1"; }, 300);

  document.getElementById("logoutBtn").classList.remove("hidden");
  document.getElementById("currentUserDisplay").textContent = "Logged in as " + currentDisplayName;

  loadServers();
  loadUsersForAdmin();
}

// ================== SERVERS ==================
function createServer() {
  if (!currentUser) return alert("Please log in first");
  const name = prompt("New server name?");
  if (!name) return;
  const serverId = "server_" + Date.now();
  db.ref("servers/" + serverId).set({ name: name, owner: currentUser.uid, createdAt: Date.now() })
    .then(() => { switchRoom(serverId); closeSidebarOnMobile(); });
}

function loadServers() {
  const list = document.getElementById("serversList");
  list.innerHTML = "";
  db.ref("servers").once("value", snap => {
    snap.forEach(child => {
      const s = child.val();
      const div = document.createElement("div");
      div.className = "px-5 py-3 hover:bg-zinc-800 rounded-2xl cursor-pointer flex items-center gap-3";
      div.innerHTML = `<span class="text-xl">📡</span><span>${s.name}</span>`;
      div.onclick = () => { switchRoom(child.key); closeSidebarOnMobile(); };
      list.appendChild(div);
    });
  });
}

// ================== CHAT WITH INDIVIDUAL DELETE ==================
function switchRoom(roomId) {
  currentRoom = roomId;
  document.getElementById("roomTitle").textContent = roomId === "global" ? "Global Chat" : "Server Chat";
  document.getElementById("messages").innerHTML = "";
  loadMessages();
}

function sendMessage() {
  if (!currentUser) return alert("Please log in");
  const text = document.getElementById("messageInput").value.trim();
  if (!text) return;

  db.ref("chats/" + currentRoom).push({
    userId: currentUser.uid,
    displayName: currentDisplayName,
    text: text,
    timestamp: Date.now()
  });

  document.getElementById("messageInput").value = "";
}

function loadMessages() {
  const container = document.getElementById("messages");
  const ref = db.ref("chats/" + currentRoom);
  ref.off();

  ref.on("child_added", (snapshot) => {
    const msg = snapshot.val();
    if (!msg) return;

    const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    const messageDiv = document.createElement("div");
    messageDiv.className = `flex ${msg.userId === (currentUser?.uid || '') ? 'justify-end' : 'justify-start'} group`;

    messageDiv.innerHTML = `
      <div class="${msg.userId === (currentUser?.uid || '') ? 'bg-sky-600 text-white' : 'bg-zinc-800'} 
                  max-w-[70%] rounded-3xl px-6 py-3.5 relative">
        <div class="text-xs opacity-75 mb-1">${msg.displayName} • ${time}</div>
        <div class="text-[15px]">${msg.text}</div>
      </div>
    `;

    // Individual delete button - only for admin
    if (isAdmin) {
      const delBtn = document.createElement("button");
      delBtn.className = "ml-3 mt-1 text-red-400 text-xl opacity-0 group-hover:opacity-100 transition hover:scale-110";
      delBtn.textContent = "🗑";
      delBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm("Delete this message permanently?")) {
          db.ref(`chats/${currentRoom}/${snapshot.key}`).remove()
            .then(() => console.log("Message deleted"))
            .catch(err => console.error("Delete failed:", err));
        }
      };
      messageDiv.appendChild(delBtn);
    }

    container.appendChild(messageDiv);
    messageDiv.scrollIntoView({ behavior: "smooth" });
  });
}

// ================== ADMIN ==================
function showAdminPanel() {
  if (!currentUser) return alert("Login first");
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("adminModal").classList.remove("hidden");
  document.getElementById("adminContent").classList.add("hidden");
}

function verifyAdmin() {
  if (document.getElementById("adminPass").value === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById("adminContent").classList.remove("hidden");
    loadUsersForAdmin();
    alert("Admin mode activated - hover over messages to see delete buttons");
  } else {
    alert("Wrong password");
  }
}

function hideAdminPanel() {
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("adminModal").classList.add("hidden");
}

function loadUsersForAdmin() {
  const dropdown = document.getElementById("userDropdown");
  dropdown.innerHTML = "<option value=''>Select a user...</option>";
  db.ref("users").once("value", snap => {
    snap.forEach(child => {
      const u = child.val();
      const opt = document.createElement("option");
      opt.value = child.key;
      opt.textContent = u.displayName || u.email || child.key;
      dropdown.appendChild(opt);
    });
  });
}

function adminBan() { const uid = document.getElementById("userDropdown").value; if (uid) { bannedUsers.add(uid); alert("User banned"); } }
function adminTimeout() { const uid = document.getElementById("userDropdown").value; if (uid) { timeouts.set(uid, Date.now() + 300000); alert("Timed out"); } }
function adminKick() { alert("Kicked (demo)"); }
function adminClearUserMessages() { alert("Messages cleared (demo)"); }

// Friends
function addFriend() {
  const name = document.getElementById("addFriend").value.trim();
  if (!name) return;
  let friends = JSON.parse(localStorage.getItem("friends") || "[]");
  if (!friends.includes(name)) friends.push(name);
  localStorage.setItem("friends", JSON.stringify(friends));
  renderFriends();
}

function renderFriends() {
  const list = document.getElementById("friendsList");
  list.innerHTML = "";
  const friends = JSON.parse(localStorage.getItem("friends") || "[]");
  friends.forEach(f => {
    const div = document.createElement("div");
    div.className = "px-5 py-3 hover:bg-zinc-800 rounded-2xl cursor-pointer";
    div.textContent = f;
    div.onclick = () => { switchRoom("private_" + f); closeSidebarOnMobile(); };
    list.appendChild(div);
  });
}

// Init
window.onload = () => {
  renderFriends();
  loadServers();
  switchRoom("global");

  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      db.ref("users/" + user.uid).once("value", snap => {
        const data = snap.val() || {};
        currentDisplayName = data.displayName || "User";
        updateUIAfterLogin();
      });
    }
  });
};
</script>
</body>
</html>
