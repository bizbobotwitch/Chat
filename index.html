<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatty</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#18181f;--s3:#1f1f28;
  --b1:#252530;--b2:#2d2d3d;
  --ac:#6c63ff;--ac-dim:rgba(108,99,255,.14);--ac-bdr:rgba(108,99,255,.28);
  --gr:#2ecc8a;--rd:#ff4f4f;--am:#f5a623;--bl:#4fa3ff;
  --t1:#ededf5;--t2:#8888aa;--t3:#4a4a66;
  --sw:260px;
}
html,body{height:100%;font-family:'Sora',sans-serif;background:var(--bg);color:var(--t1);overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}

/* LAYOUT */
.app{display:flex;height:100vh;position:relative}

/* SIDEBAR */
.sidebar{
  width:var(--sw);min-width:var(--sw);background:var(--s1);
  border-right:1px solid var(--b1);display:flex;flex-direction:column;
  height:100%;z-index:10;transition:transform .25s ease;flex-shrink:0;
}
.sb-head{padding:16px 14px 13px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:32px;height:32px;border-radius:9px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;box-shadow:0 0 16px rgba(108,99,255,.35);flex-shrink:0}
.logo-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.sb-scroll{flex:1;overflow-y:auto;padding:12px 10px}
.sb-sec{margin-bottom:20px}
.sb-lbl{font-size:9px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--t3);padding:0 6px;margin-bottom:7px;display:block}
.sb-row{display:flex;align-items:center;gap:4px;margin-bottom:7px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);transition:all .14s;position:relative;user-select:none;width:100%;border:none;background:none;font-family:'Sora',sans-serif;text-align:left}
.nav-item:hover{background:var(--s3);color:var(--t1)}
.nav-item.active{background:var(--ac-dim);color:var(--ac)}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:55%;background:var(--ac);border-radius:99px}
.nav-ic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ic-btn{width:25px;height:25px;border-radius:7px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .14s;flex-shrink:0}
.ic-btn:hover{background:var(--s3);color:var(--t1)}
.sb-foot{padding:11px 10px;border-top:1px solid var(--b1);flex-shrink:0}
.me-bar{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;background:var(--s2);margin-bottom:8px}
.me-av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;box-shadow:0 0 10px rgba(108,99,255,.25);overflow:hidden;}
.me-name{font-size:12.5px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.me-status{font-size:10px;color:var(--gr)}
.admin-sb{width:100%;padding:8px;border-radius:9px;background:rgba(255,79,79,.07);border:1px solid rgba(255,79,79,.17);color:var(--rd);font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .14s}
.admin-sb:hover{background:rgba(255,79,79,.14)}
.si{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;min-width:0;transition:border-color .14s}
.si:focus{border-color:var(--ac)}
.si::placeholder{color:var(--t3)}
.si-btn{padding:7px 10px;border-radius:8px;background:var(--s3);border:1px solid var(--b2);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .14s;white-space:nowrap;flex-shrink:0}
.si-btn:hover{color:var(--t1)}
.fr-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;cursor:pointer;transition:all .14s;width:100%;border:none;background:none;font-family:'Sora',sans-serif;text-align:left}
.fr-item:hover{background:var(--s2)}
.fr-av{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden;}
.fr-name{font-size:12.5px;font-weight:500;color:var(--t2)}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0; position:relative;}
.chat-head{height:54px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.ch-ic{font-size:17px}
.ch-title{font-size:14.5px;font-weight:600;letter-spacing:-.2px}
.ch-sub{font-size:11px;color:var(--t2);margin-top:1px}
.head-r{margin-left:auto;display:flex;gap:7px;align-items:center}
.h-btn{padding:6px 12px;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;border:1px solid var(--b2);background:var(--s2);color:var(--t2);transition:all .14s}
.h-btn:hover{color:var(--t1)}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:0}
.sys{text-align:center;margin:10px 0}
.sys span{background:var(--s1);border:1px solid var(--b1);padding:3px 12px;border-radius:99px;font-size:10.5px;color:var(--t3);display:inline-block}
.msg-wrap{display:flex;gap:10px;padding:5px 8px;border-radius:10px;transition:background .12s;position:relative;align-items:flex-start}
.msg-wrap:hover{background:var(--s2)}
.msg-wrap:hover .msg-acts{opacity:1;pointer-events:all}
.msg-wrap.mentioned{background:rgba(245, 166, 35, 0.15); border-left: 3px solid var(--am);}
.msg-av{width:34px;height:34px;border-radius:9px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;overflow:hidden;}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.msg-name{font-size:13px;font-weight:600}
.msg-time{font-size:10px;color:var(--t3)}
.msg-text{font-size:13.5px;line-height:1.55;color:var(--t1);word-break:break-word;white-space:pre-wrap;display:block}
.msg-text.deleted-txt{color:var(--t3);font-style:italic;font-size:12.5px}
.msg-text.censored-txt{color:var(--am)}
.msg-gif{max-width:250px; border-radius:8px; margin-top:6px; display:block; border:1px solid var(--b2);}

/* REPLY SYSTEM */
.rp-block{display:flex;align-items:flex-start;gap:8px;background:var(--s3);border-left:2px solid var(--ac);border-radius:0 7px 7px 0;padding:5px 10px;margin-bottom:5px;cursor:pointer;transition:background .12s;max-width:500px}
.rp-block:hover{background:var(--b1)}
.rp-who{font-size:11px;font-weight:600;color:var(--ac);margin-bottom:1px}
.rp-txt{font-size:11.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:380px}

/* HOVER ACTIONS */
.msg-acts{position:absolute;right:8px;top:-14px;background:var(--s1);border:1px solid var(--b2);border-radius:9px;display:flex;gap:1px;padding:3px;opacity:0;pointer-events:none;transition:opacity .13s;z-index:5;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.ma{width:27px;height:27px;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .13s}
.ma:hover{background:var(--s3);color:var(--t1)}
.ma.rd:hover{background:rgba(255,79,79,.15);color:var(--rd)}

/* GIF MENU */
.gif-menu{position:absolute; bottom:80px; left:20px; right:20px; max-width:400px; background:var(--s1); border:1px solid var(--b2); border-radius:14px; padding:14px; box-shadow:0 10px 40px rgba(0,0,0,.5); display:none; flex-direction:column; gap:10px; z-index:20;}
.gif-menu.open{display:flex; animation:mIn .2s cubic-bezier(.34,1.56,.64,1);}
.gif-tabs{display:flex; gap:10px; border-bottom:1px solid var(--b1); padding-bottom:10px;}
.gif-tab{background:none; border:none; color:var(--t2); cursor:pointer; font-size:12px; font-weight:600; padding:4px 8px; border-radius:4px;}
.gif-tab.active{background:var(--ac-dim); color:var(--ac);}
.gif-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:220px; overflow-y:auto; padding-right:4px;}
.gif-container{position:relative;}
.gif-item{width:100%; height:100px; object-fit:cover; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:border .14s;}
.gif-item:hover{border-color:var(--ac);}
.gif-fav-btn{position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.6); border:none; color:white; border-radius:50%; width:24px; height:24px; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center;}

/* INPUT */
.input-zone{padding:13px 18px;background:var(--s1);border-top:1px solid var(--b1);flex-shrink:0}
.inp-row{display:flex;gap:8px;align-items:center}
.gif-btn{width:44px; height:44px; border-radius:12px; background:var(--s3); border:1px solid var(--b2); color:var(--t2); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:14px; font-weight:700; transition:all .14s}
.m-input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:11px 16px;font-size:13.5px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;transition:border-color .14s;height:44px}
.m-input:focus{border-color:var(--ac)}
.send-btn{width:44px;height:44px;border-radius:12px;background:var(--ac);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 16px rgba(108,99,255,.28);transition:all .14s}

/* TOAST */
.toasts{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--s1);border:1px solid var(--b2);border-radius:10px;padding:10px 14px;font-size:12.5px;font-weight:500;box-shadow:0 6px 22px rgba(0,0,0,.35);display:flex;align-items:center;gap:8px;animation:tIn .22s cubic-bezier(.34,1.56,.64,1);min-width:190px;max-width:290px}
.toast.ok{border-color:rgba(46,204,138,.28)}.toast.err{border-color:rgba(255,79,79,.28)}.toast.warn{border-color:rgba(245,166,35,.28)}

/* MODALS */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:18px;width:100%;max-width:410px;padding:26px;box-shadow:0 28px 70px rgba(0,0,0,.6);animation:mIn .2s cubic-bezier(.34,1.56,.64,1)}
.modal.wide{max-width:500px}
.m-title{font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px}
.fi{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:11px 14px;font-size:13.5px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;margin-bottom:13px;transition:border-color .14s}
.mbtn{width:100%;padding:12px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;border:none;transition:all .14s;margin-bottom:8px;background:var(--ac);color:#fff}
.mb-s{background:var(--s3);color:var(--t2);border:1px solid var(--b2)}

/* ADMIN CSS */
.a-sec{margin-bottom:14px}
.a-lbl{font-size:9.5px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:var(--t3);margin-bottom:8px;display:block}
.a-sel{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:9px 13px;font-size:13px;color:var(--t1);font-family:'Sora',sans-serif;outline:none;margin-bottom:10px}
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.abtn{padding:9px 6px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;border:none;transition:opacity .14s}
.abtn:hover{opacity:.78}
.a-ucard{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:11px 13px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.sdot{width:7px;height:7px;border-radius:99px;flex-shrink:0}
.sd-ok{background:var(--gr)}.sd-ban{background:var(--rd)}.sd-to{background:var(--am)}

@keyframes tIn{from{opacity:0;transform:translateX(12px)}}
@keyframes mIn{from{opacity:0;transform:scale(.94) translateY(8px)}}
</style>
</head>
<body>

<div class="toasts" id="toasts"></div>
<button class="ham" id="ham" onclick="mobToggle()">☰</button>
<div class="mob-ov" id="mobOv" onclick="mobToggle()"></div>

<div class="ov open" id="authOv">
  <div class="modal" id="loginBox">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <div class="logo">C</div>
      <div class="m-title">Welcome back</div>
    </div>
    <input class="fi" id="li-u" type="email" placeholder="Email Address">
    <input class="fi" id="li-p" type="password" placeholder="••••••••" onkeypress="if(event.key==='Enter')doLogin()">
    <button class="mbtn mb-p" onclick="doLogin()">Sign In →</button>
    <div class="mlink" style="text-align:center; font-size:12px">No account? <a onclick="showReg()" style="color:var(--ac); cursor:pointer">Create one</a></div>
  </div>

  <div class="modal" id="regBox" style="display:none">
    <div class="m-title">Join Chatty</div>
    <p style="font-size: 11px; color: var(--t2); margin-bottom: 10px;">Create a new account.</p>
    <input class="fi" id="ri-d" type="text" placeholder="Display Name">
    <input class="fi" id="ri-u" type="email" placeholder="Email Address">
    <input class="fi" id="ri-p" type="password" placeholder="Password (Min 6 chars)">
    <input class="fi" id="ri-p2" type="password" placeholder="Repeat password" onkeypress="if(event.key==='Enter')doRegister()">
    <button class="mbtn mb-p" onclick="doRegister()">Create Account →</button>
    <div class="mlink" style="text-align:center; font-size:12px; margin-top:10px">Have an account? <a onclick="showLogin()" style="color:var(--ac); cursor:pointer">Sign in</a></div>
  </div>
</div>

<div class="ov" id="profileOv">
  <div class="modal">
    <div class="m-title">👤 Edit Profile</div>
    <input class="fi" id="ep-d" type="text" placeholder="Your display name">
    <input class="fi" id="ep-pfp" type="url" placeholder="PFP Image URL">
    <button class="mbtn mb-p" onclick="saveProfile()">Save Changes</button>
    <button class="mbtn mb-s" onclick="hideProfile()">Cancel</button>
  </div>
</div>

<div class="ov" id="adminOv">
  <div class="modal wide">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
      <div class="m-title">🔧 Admin Panel</div>
      <button class="ic-btn" onclick="hideAdmin()" style="font-size:16px">✕</button>
    </div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:20px">Moderation &amp; user management</div>

    <div id="aLock">
      <label class="a-lbl">Admin/Mod Password</label>
      <input class="fi" id="a-pw" type="password" placeholder="Enter password" onkeypress="if(event.key==='Enter')verifyAdmin()">
      <div id="a-err" style="color:var(--rd);font-size:12px;display:none;margin-bottom:10px"></div>
      <button class="mbtn mb-p" onclick="verifyAdmin()">Unlock</button>
    </div>

    <div id="aCont" style="display:none">
      <div class="a-sec">
        <span class="a-lbl">Global Actions</span>
        <div class="a-grid">
          <button id="btn-del-all" class="abtn" style="background:rgba(255,79,79,.1);color:var(--rd);border:1px solid rgba(255,79,79,.22)" onclick="adminClearAllChats()">🗑 Delete All Chats</button>
          <button class="abtn" style="background:var(--s3);color:var(--t2);border:1px solid var(--b2)" onclick="loadAdminUsers()">🔄 Refresh Users</button>
        </div>
      </div>
      <hr style="border:none;border-top:1px solid var(--b1);margin:16px 0">
      <div class="a-sec">
        <span class="a-lbl">User Actions</span>
        <select class="a-sel" id="a-sel" onchange="loadAUser()">
          <option value="">— select user —</option>
        </select>
        <div id="a-card" style="display:none"></div>
        <div class="a-grid" id="a-actions" style="display:none">
          <button class="abtn" style="background:rgba(245,166,35,.1);color:var(--am);border:1px solid rgba(245,166,35,.22)" onclick="adminTO(5)">⏱ Timeout 5m</button>
          <button class="abtn" style="background:rgba(245,166,35,.1);color:var(--am);border:1px solid rgba(245,166,35,.22)" onclick="adminTO(60)">⏱ Timeout 1h</button>
          <button id="btn-ban" class="abtn" style="background:rgba(255,79,79,.1);color:var(--rd);border:1px solid rgba(255,79,79,.22)" onclick="adminBan()">🚫 Ban Account</button>
          <button id="btn-hwban" class="abtn" style="background:rgba(255,79,79,.1);color:var(--rd);border:1px solid rgba(255,79,79,.22)" onclick="adminHWBan()">🔨 HW-ID Ban</button>
          <button class="abtn" style="background:rgba(46,204,138,.09);color:var(--gr);border:1px solid rgba(46,204,138,.2)" onclick="adminUnban()">✅ Unban / Untimeout</button>
          <button class="abtn" style="background:rgba(255,79,79,.1);color:var(--rd);border:1px solid rgba(255,79,79,.22)" onclick="adminClearUser()">🗑 Clear Their Msgs</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sb-head"><div class="logo">C</div><span class="logo-name">Chatty</span></div>
    <div class="sb-scroll">
      <div class="sb-sec">
        <span class="sb-lbl">Channels</span>
        <button class="nav-item active" onclick="switchRoom('global')">🌐 Global Chat</button>
      </div>
      <div class="sb-sec">
        <div class="sb-row"><span class="sb-lbl" style="flex:1">Servers</span><button class="ic-btn" onclick="createServer()">＋</button></div>
        <div id="serversList"></div>
      </div>
      <div class="sb-sec">
        <span class="sb-lbl">Direct Messages</span>
        <div class="sb-row"><input class="si" id="dmInp" placeholder="Add by username..."><button class="si-btn" onclick="addFriend()">Add</button></div>
        <div id="friendsList"></div>
      </div>
    </div>
    
    <div class="sb-foot">
      <div class="me-bar">
        <div class="me-av" id="meAv">?</div>
        <div style="flex:1;min-width:0">
          <div class="me-name" id="meName">—</div>
          <div class="me-status">● Online</div>
        </div>
        <button class="ic-btn" title="Edit Profile" onclick="showProfile()">✏️</button>
        <button class="ic-btn" title="Sign out" onclick="signOut()">⎋</button>
      </div>
      <button class="admin-sb" onclick="showAdmin()">🔧 Admin Tools</button>
    </div>
  </div>

  <div class="chat">
    <div class="chat-head">
      <div class="ch-title" id="chTitle">Global Chat</div>
    </div>
    <div class="msgs" id="msgs"></div>

    <div class="gif-menu" id="gifMenu">
      <div class="gif-tabs">
        <button class="gif-tab active" id="tab-search" onclick="setGifTab('search')">Search</button>
        <button class="gif-tab" id="tab-favs" onclick="setGifTab('favs')">Favorites ❤️</button>
      </div>
      <input class="fi" id="gifSearchInp" placeholder="Search Giphy..." onkeyup="if(event.key==='Enter')searchGifs()">
      <div class="gif-grid" id="gifGrid"></div>
    </div>

    <div class="reply-bar" id="replyBar" style="display:none">
      <div class="rb-info"><div class="rb-who" id="rbWho"></div><div class="rb-preview" id="rbPrev"></div></div>
      <button class="rb-x" onclick="cancelReply()">✕</button>
    </div>

    <div class="input-zone">
      <div class="inp-row">
        <button class="gif-btn" onclick="toggleGifMenu()">GIF</button>
        <input class="m-input" id="msgInp" placeholder="Message..." onkeydown="onKey(event)">
        <button class="send-btn" onclick="doSend()">🚀</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── FIREBASE ──────────────────────────────────

firebase.initializeApp(FC);
const db=firebase.database();

// ── STATE ─────────────────────────────────────
let me=null, myDisplayName=null, myPfp="", room='global', msgRef=null, roomJoinTime=0, replyTo=null, currentGifTab='search';
let adminRole = null; // Can be 'admin', 'mod', or null

// ── HARDWARE ID ───────────────────────────────
function getHWID(){let id=localStorage.getItem('_chwid');if(!id){id='hw_'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('_chwid',id);}return id;}
const HWID=getHWID();
async function isHWBanned(){try{const s=await db.ref('hwbans/'+btoa(HWID).replace(/[=+/]/g,c=>({'=':'','+':`-`,'/':'_'}[c]))).once('value');return s.exists();}catch{return false;}}

const COLORS=['#6c63ff','#2ecc8a','#f5a623','#ff5f5f','#4fa3ff','#d06ef7','#6ef7c2'];

const BAD=['fuck','shit','bitch','cunt','dick','pussy','bastard','nigger','nigga','faggot','fag','retard','whore','slut','cock','asshole','motherfucker','kys','rape','rapist','pedophile','pedo','nazi'];
function censor(t) {
  let o = t, hit = false;
  BAD.forEach(w => {
    const charMap = {'a':'[a@4]','e':'[e3]','i':'[i1!l]','o':'[o0]','s':'[s$5]','t':'[t7+]','c':'[c\\(k]','u':'[uv]','l':'[l1I]'};
    let rxStr = w.split('').map(c => charMap[c] || c).join('[\\s\\W_]*');
    const rx = new RegExp(rxStr, 'gi');
    if (rx.test(o)) { hit = true; o = o.replace(rx, m => '█'.repeat(m.length)); }
  });
  return {text: o, censored: hit};
}

const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
function simpleHash(s){let h=5381;for(let i=0;i<s.length;i++){h=((h<<5)+h)+s.charCodeAt(i);h|=0;}return 'h'+Math.abs(h).toString(36);}
function uCol(n){return COLORS[n?n.charCodeAt(0)%COLORS.length:0];}
function fmt(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

// ── TOAST MESSAGES ──
function toast(msg,type='info'){
  const icons={ok:'✅',err:'❌',warn:'⚠️',info:'💬'};
  const el=document.createElement('div');el.className='toast '+type;
  el.innerHTML=`<span>${icons[type]||'💬'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .3s,transform .3s';el.style.opacity=0;el.style.transform='translateX(12px)';setTimeout(()=>el.remove(),320);},3000);
}

// ── 2 HOUR AUTO-RESET LOOP ────────────────────
async function checkAutoReset() {
  const snap = await db.ref('server_meta/lastReset').once('value');
  const lastReset = snap.val() || 0;
  const now = Date.now();
  const TWO_HOURS = 2 * 60 * 60 * 1000;
  
  if (now - lastReset > TWO_HOURS) {
    await db.ref('chats').remove(); 
    await db.ref('server_meta/lastReset').set(now);
    console.log('2-Hour Auto-reset triggered.');
  }
}
checkAutoReset();
setInterval(checkAutoReset, 60000);

window.onload = async () => {
  const savedUser = localStorage.getItem('chatty_user');
  if (savedUser) {
    if (await isHWBanned()) {
      localStorage.removeItem('chatty_user');
      return;
    }
    const snap = await db.ref('users/' + savedUser).once('value');
    if (snap.exists()) {
      const d = snap.val();
      if(d.banned) {
        localStorage.removeItem('chatty_user');
        return;
      }
      me = savedUser; myDisplayName = d.displayName || savedUser; myPfp = d.pfp || "";
      onLoggedIn();
    }
  }
};

// ── AUTHENTICATION ────────────────────────────
async function doLogin(){
  const email = document.getElementById('li-u').value.trim().toLowerCase();
  const p = document.getElementById('li-p').value;
  if(!email || !p) { alert("Please enter email and password."); return; }
  
  if (await isHWBanned()) { alert("🚫 This device is banned."); return; }

  const u = email.replace(/[\.\#\$\[\]]/g, '_');
  
  const snap=await db.ref('users/'+u).once('value');
  if(!snap.exists()) { alert("Account not found."); return; }
  
  const d = snap.val();
  if(d.password !== simpleHash(p)){alert("Invalid Email or Password"); return;}
  if(d.banned) { alert("🚫 This account has been banned."); return; }
  
  // Link current HWID
  await db.ref('users/'+u).update({hwid: HWID});

  me=u; myDisplayName=d.displayName; myPfp=d.pfp;
  localStorage.setItem('chatty_user', u); onLoggedIn();
}

async function doRegister(){
  const dName=document.getElementById('ri-d').value.trim();
  const email=document.getElementById('ri-u').value.trim().toLowerCase();
  const p=document.getElementById('ri-p').value;
  const p2=document.getElementById('ri-p2').value;

  if(!email || !dName || !p) { alert("Please fill out all fields."); return; }
  
  if (await isHWBanned()) { alert("🚫 This device is banned from creating accounts."); return; }

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!emailPattern.test(email)){ alert("Please enter a valid email address format."); return; }
  
  if(p !== p2){ alert("Passwords don't match."); return; }
  if(p.length < 6){ alert("Password must be at least 6 characters."); return; }

  const u = email.replace(/[\.\#\$\[\]]/g, '_');
  const check = await db.ref('users/'+u).once('value');
  if(check.exists()){ alert("This email is already registered."); return; }

  await db.ref('users/'+u).set({
    username: u, 
    displayName: dName, 
    pfp: "", 
    password: simpleHash(p), 
    ts: Date.now(),
    banned: false,
    timeoutUntil: 0,
    hwid: HWID
  });

  me = u; 
  myDisplayName = dName; 
  localStorage.setItem('chatty_user', u); 
  onLoggedIn();
}

function onLoggedIn(){
  document.getElementById('authOv').classList.remove('open');
  document.getElementById('mainApp').style.display='flex';
  updateSidebarProfile(); switchRoom('global');
  toast('Welcome back, ' + myDisplayName + '!', 'ok');
}

function updateSidebarProfile() {
  const av=document.getElementById('meAv');
  if(myPfp) av.innerHTML=`<img src="${esc(myPfp)}" style="width:100%;height:100%;object-fit:contain;background:var(--s2);border-radius:9px;">`; 
  else { av.textContent=myDisplayName[0].toUpperCase(); av.style.background=uCol(me); }
  document.getElementById('meName').textContent=myDisplayName;
}

function signOut(){ localStorage.removeItem('chatty_user'); location.reload(); }
function showProfile(){ document.getElementById('profileOv').classList.add('open'); }
function hideProfile(){ document.getElementById('profileOv').classList.remove('open'); }
async function saveProfile(){
  const n=document.getElementById('ep-d').value.trim(), p=document.getElementById('ep-pfp').value.trim();
  await db.ref('users/'+me).update({displayName:n, pfp:p});
  myDisplayName=n; myPfp=p; updateSidebarProfile(); hideProfile(); toast('Profile saved', 'ok');
}

// ── ADMIN / MODERATOR TOOLS ──
function showAdmin(){
  document.getElementById('adminOv').classList.add('open');
  document.getElementById('aLock').style.display='';
  document.getElementById('aCont').style.display='none';
  document.getElementById('a-pw').value='';

function hideAdmin(){document.getElementById('adminOv').classList.remove('open');}

function verifyAdmin(){
  const pw = document.getElementById('a-pw').value;

function setupAdminUI() {
  document.getElementById('aLock').style.display='none';
  document.getElementById('aCont').style.display='';
  
  if (adminRole === 'mod') {

async function loadAdminUsers(){
  const sel=document.getElementById('a-sel');sel.innerHTML='<option value="">— select user —</option>';
  const snap=await db.ref('users').once('value');
  snap.forEach(c=>{
    const u=c.val();const opt=document.createElement('option');opt.value=c.key;
    const dName = u.displayName || c.key;
    opt.textContent= dName + ' (@' + c.key + ')' + (u.banned?' 🚫':u.timeoutUntil>Date.now()?' ⏱':'');
    sel.appendChild(opt);
  });
}

async function loadAUser(){
  const uname=document.getElementById('a-sel').value;
  const card=document.getElementById('a-card'),acts=document.getElementById('a-actions');
  if(!uname){card.style.display='none';acts.style.display='none';return;}
  const snap=await db.ref('users/'+uname).once('value');const u=snap.val()||{};
  const now=Date.now();
  const banned=u.banned,timed=u.timeoutUntil&&u.timeoutUntil>now;
  const dc=banned?'sd-ban':timed?'sd-to':'sd-ok';
  const st=banned?'Banned':timed?'Timed out ('+Math.ceil((u.timeoutUntil-now)/60000)+'m)':'Active';
  
  const dName = u.displayName || uname;

  card.style.display='';acts.style.display='';
  card.innerHTML=`<div class="a-ucard">
    <div class="me-av" style="width:28px;height:28px;font-size:12px;background:${uCol(uname)}; border-radius:9px; display:flex; align-items:center; justify-content:center; font-weight:bold;">${dName[0].toUpperCase()}</div>

    <div style="display:flex;align-items:center;gap:5px"><div class="sdot ${dc}"></div><span style="font-size:11px;color:var(--t2)">${st}</span></div>
  </div>`;
}

}
async function adminHWBan(){

  if(u===me){alert("Can't ban yourself");return;}

  await db.ref('users/'+u).update({banned:true});

async function adminUnban(){
  const u=document.getElementById('a-sel').value;if(!u){return;}
  const snap=await db.ref('users/'+u).once('value');const ud=snap.val()||{};
  if(ud.hwid){
    const hk=btoa(ud.hwid).replace(/[=+/]/g,c=>({'=':'','+':`-`,'/':'_'}[c]));
    await db.ref('hwbans/'+hk).remove();
  }
  await db.ref('users/'+u).update({banned:false,timeoutUntil:0});
  toast(u + ' unbanned/untimed out', 'ok');
  loadAdminUsers();loadAUser();
}
async function adminClearUser(){
  const u=document.getElementById('a-sel').value;if(!u){return;}
  if(!confirm('Delete all messages from '+u+' in current room?'))return;
  const snap=await db.ref('chats/'+room).once('value');
  const updates={};
  snap.forEach(c=>{if(c.val().user===u){updates['chats/'+room+'/'+c.key+'/text']='';updates['chats/'+room+'/'+c.key+'/deleted']=true;}});
  await db.ref().update(updates);
  toast('Messages cleared', 'ok');
}
async function adminClearAllChats(){
  if (adminRole !== 'admin') { toast('Only Admins can clear all chats.', 'err'); return; }
  if(!confirm('⚠️ Delete ALL messages in the current room? This cannot be undone.'))return;
  await db.ref('chats/'+room).remove();
  await db.ref('server_meta/lastReset').set(Date.now()); // Restart the 2-hour timer
  toast('Chat room wiped', 'ok');
}

// ── GIPHY LOGIC WITH BACKUP KEY ──
function toggleGifMenu(){ 
  document.getElementById('gifMenu').classList.toggle('open'); 
  if(document.getElementById('gifMenu').classList.contains('open')) {
    if(currentGifTab === 'search') searchGifs(); else renderFavGifs();
  }
}

function setGifTab(tab) {
  currentGifTab = tab;
  document.getElementById('tab-search').classList.toggle('active', tab === 'search');
  document.getElementById('tab-favs').classList.toggle('active', tab === 'favs');
  document.getElementById('gifSearchInp').style.display = tab === 'search' ? 'block' : 'none';
  if(tab === 'search') searchGifs(); else renderFavGifs();
}

async function searchGifs() {
  const q = document.getElementById('gifSearchInp').value;
  const primaryKey = 'P5hgFIPg3F1AIqXVdUTVIoq4p7A4DJFn';
  const backupKey = 'n653pzwYMyd8Z1I71vUWO29y9WlnBhJy';
  
  const getUrl = (key) => q ? `https://api.giphy.com/v1/gifs/search?api_key=${key}&q=${q}&limit=8&rating=pg-13` : `https://api.giphy.com/v1/gifs/trending?api_key=${key}&limit=8&rating=pg-13`;
  
  try {
    let res = await fetch(getUrl(primaryKey));
    
    // If rate limited or unathorized, try the backup key
    if (res.status === 429 || !res.ok) {
      console.log('Primary Giphy key rate limited. Trying backup key...');
      res = await fetch(getUrl(backupKey));
    }
    
    const data = await res.json();
    if (data && data.data) {
      renderGifGrid(data.data);
    }
  } catch (error) {
    toast('Error loading GIFs', 'err');
    console.error(error);
  }
}

function renderGifGrid(gifs) {
  const grid=document.getElementById('gifGrid'); grid.innerHTML='';
  const favs = JSON.parse(localStorage.getItem('gif_favs') || '[]');
  gifs.forEach(g=>{
    const url = g.images.fixed_height.url;
    const isFav = favs.includes(url);
    const container = document.createElement('div');
    container.className = 'gif-container';
    container.innerHTML = `
      <img src="${url}" class="gif-item" onclick="sendGif('${url}')">
      <button class="gif-fav-btn" onclick="toggleFavGif(event, '${url}')">${isFav ? '❤️' : '🤍'}</button>
    `;
    grid.appendChild(container);
  });
}

function toggleFavGif(e, url) {
  e.stopPropagation();
  let favs = JSON.parse(localStorage.getItem('gif_favs') || '[]');
  if(favs.includes(url)) favs = favs.filter(f => f !== url);
  else favs.push(url);
  localStorage.setItem('gif_favs', JSON.stringify(favs));
  if(currentGifTab === 'search') searchGifs(); else renderFavGifs();
}

function renderFavGifs() {
  const favs = JSON.parse(localStorage.getItem('gif_favs') || '[]');
  const grid=document.getElementById('gifGrid'); grid.innerHTML='';
  if(favs.length === 0) { grid.innerHTML = '<div style="color:var(--t2); font-size:11px; padding:20px;">No favorites yet</div>'; return; }
  favs.forEach(url => {
    const container = document.createElement('div');
    container.className = 'gif-container';
    container.innerHTML = `
      <img src="${url}" class="gif-item" onclick="sendGif('${url}')">
      <button class="gif-fav-btn" onclick="toggleFavGif(event, '${url}')">❤️</button>
    `;
    grid.appendChild(container);
  });
}

async function sendGif(url){ 
  if(await isHWBanned()){toast('🚫 This device is banned', 'err');return;}
  const snap=await db.ref('users/'+me).once('value'); const d=snap.val()||{};
  if(d.banned){toast('🚫 Your account is banned', 'err');return;}
  if(d.timeoutUntil&&d.timeoutUntil>Date.now()){toast('⏱ You are timed out', 'warn');return;}

  await db.ref('chats/'+room).push({user:me, displayName:myDisplayName, pfp:myPfp, gif:url, ts:Date.now()}); 
  toggleGifMenu(); 
}

// ── REPLIES & DELETES ──
function startReply(key, user, dName, text){
  replyTo={key, user, displayName: dName, text};
  document.getElementById('replyBar').style.display='flex';
  document.getElementById('rbWho').textContent='Replying to ' + dName;
  document.getElementById('rbPrev').textContent=text.slice(0,60);
  document.getElementById('msgInp').focus();
}
function cancelReply(){ replyTo=null; document.getElementById('replyBar').style.display='none'; }

async function delMsg(key){
  if(!confirm('Delete this message?'))return;
  await db.ref('chats/'+room+'/'+key).update({text:'',deleted:true});
}

// ── MESSAGES ──
function switchRoom(id){
  if(msgRef) db.ref('chats/'+room).off(); room=id; roomJoinTime=Date.now();
  document.getElementById('msgs').innerHTML='';
  msgRef=db.ref('chats/'+room).limitToLast(100);
  
  msgRef.on('child_added',s=>addMsg(s.key,s.val()));
  msgRef.on('child_changed',s=>{
    const old=document.getElementById('msg-'+s.key);
    if(old){const tmp=document.createElement('div');addMsg(s.key,s.val(),tmp);if(tmp.firstChild)old.replaceWith(tmp.firstChild);}
  });
  msgRef.on('child_removed', s => {
    const element = document.getElementById('msg-' + s.key);
    if (element) { element.remove(); }
  });
}

function addMsg(key,msg, containerOverride = null){
  const box=containerOverride || document.getElementById('msgs'); 
  const dName=msg.displayName||msg.user;
  const {text:ct, censored:wc} = censor(msg.text||"");
  
  const isMention = ct.includes('@' + me) || ct.includes('@' + myDisplayName);
  
  let content = '';
  if(msg.deleted){
    content = '<span class="msg-text deleted-txt">🗑 This message was deleted</span>';
  } else {
    content = msg.gif ? `<img class="msg-gif" src="${msg.gif}">` : `<span class="msg-text">${esc(ct)}</span>`;
  }
  
  let rpHTML='';
  if(msg.replyTo && !msg.deleted){
    rpHTML=`<div class="rp-block" onclick="scrollToMsg('${msg.replyTo.key}')">
      <div class="rp-who">${esc(msg.replyTo.displayName)}</div>
      <div class="rp-txt">${esc(msg.replyTo.text)}</div>
    </div>`;
  }

  const wrap=document.createElement('div'); 
  wrap.className='msg-wrap' + (isMention ? ' mentioned' : '');
  wrap.id = 'msg-' + key;
  wrap.innerHTML=`
    <div class="msg-av" style="background:${uCol(msg.user)}">${msg.pfp?`<img src="${esc(msg.pfp)}" style="width:100%;height:100%;object-fit:contain;background:var(--s2);">`:dName[0]}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-name" style="color:${uCol(msg.user)}">${esc(dName)}</span> 
        <span class="msg-time">${fmt(msg.ts)}</span>
      </div>
      ${rpHTML}${content}
    </div>
    ${!msg.deleted ? `
    <div class="msg-acts">
      ${!msg.gif ? `<button class="ma" onclick="startReply('${key}','${msg.user}','${esc(dName)}',${JSON.stringify(ct)})">↩</button>` : ''}
      ${msg.user===me || adminRole==='admin' || adminRole==='mod' ? `<button class="ma rd" onclick="delMsg('${key}')">🗑</button>` : ''}
    </div>` : ''}`;
  
  box.appendChild(wrap); 
  if(!containerOverride) box.scrollTop=box.scrollHeight;
}

function scrollToMsg(key) {
  const el = document.getElementById('msg-' + key);
  if(el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.outline = '2px solid var(--ac)';
    setTimeout(() => el.style.outline = 'none', 2000);
  }
}

async function doSend(){
  const inp=document.getElementById('msgInp'); const txt=inp.value.trim(); if(!txt)return;

  if(await isHWBanned()){toast('🚫 This device is banned', 'err');return;}
  const snap=await db.ref('users/'+me).once('value'); const d=snap.val()||{};
  if(d.banned){toast('🚫 Your account is banned', 'err');return;}
  if(d.timeoutUntil&&d.timeoutUntil>Date.now()){
    const m=Math.ceil((d.timeoutUntil-Date.now())/60000);
    toast('⏱ Timed out — '+m+' min remaining', 'warn');return;
  }

  const {text:ct, censored:wc}=censor(txt);
  const obj = {user:me, displayName:myDisplayName, pfp:myPfp, text:ct, censored:wc, ts:Date.now(), deleted:false};
  
  if(replyTo) {
    obj.replyTo = {key: replyTo.key, displayName: replyTo.displayName, text: replyTo.text};
  }
  
  await db.ref('chats/'+room).push(obj);
  inp.value='';
  cancelReply();
}

function onKey(e){ if(e.key==='Enter')doSend(); if(e.key==='Escape')cancelReply(); }
function mobToggle(){ document.getElementById('sidebar').classList.toggle('open'); }
function showReg(){ document.getElementById('loginBox').style.display='none'; document.getElementById('regBox').style.display='block'; }
function showLogin(){ document.getElementById('regBox').style.display='none'; document.getElementById('loginBox').style.display='block'; }
