<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatty - Friends Chat</title>
  
  <!-- Firebase Compat SDK (works perfectly with your config) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #121212; color: #ddd; }
    .container { display: flex; height: 100vh; }
    .sidebar { width: 250px; background: #1e1e1e; padding: 15px; border-right: 1px solid #333; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .header { background: #1e1e1e; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .messages { flex: 1; overflow-y: auto; padding: 15px; background: #0f0f0f; }
    .message { margin: 8px 0; padding: 10px; border-radius: 8px; max-width: 70%; word-break: break-word; }
    .own { background: #0d6efd; align-self: flex-end; margin-left: auto; }
    .other { background: #333; }
    .input-area { display: flex; padding: 10px; background: #1e1e1e; }
    input { flex: 1; padding: 12px; border: none; border-radius: 6px; background: #333; color: white; }
    button { padding: 12px 20px; margin-left: 8px; background: #0d6efd; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .admin-btn { background: #dc3545; }
    .user-list { margin-top: 20px; }
    .user { padding: 8px; cursor: pointer; border-radius: 4px; }
    .user:hover { background: #333; }
    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 1000; width: 420px; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
  </style>
</head>
<body>

<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Chatty</h2>
    <input type="text" id="username" placeholder="Your username" style="width:100%; margin-bottom:10px;">
    <button onclick="setUsername()">Set Username</button>

    <h3 style="margin-top:30px;">Rooms</h3>
    <div class="user" onclick="switchRoom('global')">🌐 Global Chat</div>

    <h3>Friends</h3>
    <input type="text" id="addFriend" placeholder="Add friend username" style="width:70%;">
    <button onclick="addFriend()">Add</button>
    <div id="friendsList" class="user-list"></div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="header">
      <h3 id="roomTitle">Global Chat</h3>
      <button onclick="showAdminPanel()" class="admin-btn">🔧 Admin Panel</button>
    </div>

    <div id="messages" class="messages"></div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div class="overlay" id="overlay"></div>
<div class="modal" id="adminModal">
  <h2>🔧 Admin Panel</h2>
  <p>Enter admin password (3717):</p>
  <input type="password" id="adminPass" placeholder="Password" style="width:100%; margin-bottom:10px;">
  <button onclick="verifyAdmin()">Login as Admin</button><br><br>

  <div id="adminContent" style="display:none;">
    <h3>Moderation</h3>
    <input type="text" id="targetUser" placeholder="Username to moderate" style="width:100%; margin-bottom:8px;">
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button onclick="banUser()" style="background:#dc3545;">Ban User</button>
      <button onclick="timeoutUser()" style="background:#fd7e14;">Timeout 5min</button>
      <button onclick="kickUser()" style="background:#6c757d;">Kick</button>
    </div>
    <hr>
    <h4>Recent Messages (Global)</h4>
    <div id="adminMessages" style="max-height:300px; overflow-y:auto; font-size:14px;"></div>
  </div>

  <button onclick="hideAdminPanel()" style="margin-top:15px; width:100%;">Close</button>
</div>

<script>
// ================== YOUR FIREBASE CONFIG ==================
const firebaseConfig = {
  apiKey: "AIzaSyB-dwq2yjLEUSNZ0UT5oq4-u_KXghysXfw",
  authDomain: "discord2-1ed09.firebaseapp.com",
  databaseURL: "https://discord2-1ed09-default-rtdb.firebaseio.com",
  projectId: "discord2-1ed09",
  storageBucket: "discord2-1ed09.firebasestorage.app",
  messagingSenderId: "856172729472",
  appId: "1:856172729472:web:fa00078f5968d3e30a0265",
  measurementId: "G-XLL488F4K0"
};

// Initialize Firebase (Compat version)
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================== APP VARIABLES ==================
let currentUser = "Guest" + Math.floor(Math.random() * 10000);
let currentRoom = "global";
let isAdmin = false;
const ADMIN_PASSWORD = "3717";

const bannedUsers = new Set();
const timeouts = new Map();

// ================== FUNCTIONS ==================
function setUsername() {
  const name = document.getElementById("username").value.trim();
  if (name) {
    currentUser = name;
    alert("✅ Username set to: " + currentUser);
  }
}

function addFriend() {
  const friend = document.getElementById("addFriend").value.trim();
  if (!friend || friend === currentUser) return;
  let friends = JSON.parse(localStorage.getItem("friends") || "[]");
  if (!friends.includes(friend)) friends.push(friend);
  localStorage.setItem("friends", JSON.stringify(friends));
  renderFriends();
  switchRoom(friend);
}

function renderFriends() {
  const list = document.getElementById("friendsList");
  list.innerHTML = "";
  const friends = JSON.parse(localStorage.getItem("friends") || "[]");
  friends.forEach(f => {
    const div = document.createElement("div");
    div.className = "user";
    div.textContent = "👤 " + f;
    div.onclick = () => switchRoom(f);
    list.appendChild(div);
  });
}

function switchRoom(room) {
  currentRoom = room;
  document.getElementById("roomTitle").textContent = room === "global" ? "🌐 Global Chat" : "💬 " + room;
  document.getElementById("messages").innerHTML = "";
  loadMessages();
}

function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if (!text) return;

  if (bannedUsers.has(currentUser)) return alert("You are banned.");
  if (timeouts.has(currentUser) && Date.now() < timeouts.get(currentUser)) return alert("You are timed out.");

  db.ref("chats/" + currentRoom).push({
    user: currentUser,
    text: text,
    timestamp: Date.now()
  });

  input.value = "";
}

function loadMessages() {
  const ref = db.ref("chats/" + currentRoom);
  ref.on("child_added", (snapshot) => {
    const msg = snapshot.val();
    if (!msg) return;

    const div = document.createElement("div");
    div.className = `message ${msg.user === currentUser ? "own" : "other"}`;
    div.innerHTML = `<strong>${msg.user}:</strong> ${msg.text}`;

    if (isAdmin) {
      const del = document.createElement("button");
      del.textContent = "🗑";
      del.style.marginLeft = "10px";
      del.onclick = () => db.ref("chats/" + currentRoom + "/" + snapshot.key).remove();
      div.appendChild(del);
    }

    document.getElementById("messages").appendChild(div);
    div.scrollIntoView({ behavior: "smooth" });
  });
}

// Admin Panel
function showAdminPanel() {
  document.getElementById("overlay").style.display = "block";
  document.getElementById("adminModal").style.display = "block";
  document.getElementById("adminContent").style.display = "none";
}

function verifyAdmin() {
  if (document.getElementById("adminPass").value === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById("adminContent").style.display = "block";
    loadAdminMessages();
  } else {
    alert("❌ Wrong password");
  }
}

function hideAdminPanel() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("adminModal").style.display = "none";
}

function loadAdminMessages() {
  db.ref("chats/global").limitToLast(30).once("value", snap => {
    const container = document.getElementById("adminMessages");
    container.innerHTML = "";
    snap.forEach(child => {
      const m = child.val();
      const d = document.createElement("div");
      d.style.margin = "6px 0";
      d.innerHTML = `<strong>${m.user}:</strong> ${m.text} <button onclick="this.parentElement.remove(); db.ref('chats/global/${child.key}').remove()">Delete</button>`;
      container.appendChild(d);
    });
  });
}

function banUser() {
  const target = document.getElementById("targetUser").value.trim();
  if (target) { bannedUsers.add(target); alert(target + " banned"); }
}

function timeoutUser() {
  const target = document.getElementById("targetUser").value.trim();
  if (target) { timeouts.set(target, Date.now() + 300000); alert(target + " timed out for 5 minutes"); }
}

function kickUser() {
  const target = document.getElementById("targetUser").value.trim();
  if (target) alert(target + " kicked (demo)");
}

// Init
window.onload = () => {
  document.getElementById("username").value = currentUser;
  renderFriends();
  switchRoom("global");
};
</script>
</body>
</html>
