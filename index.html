<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatty</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #52525b; border-radius: 20px; }
    .sidebar-transition { transition: all 0.3s ease-in-out; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

<div class="flex h-screen overflow-hidden relative">

  <!-- Mobile Hamburger -->
  <button onclick="toggleSidebar()" class="md:hidden fixed top-4 left-4 z-50 bg-zinc-900 p-3 rounded-2xl border border-zinc-700">☰</button>

  <!-- Sidebar -->
  <div id="sidebar" class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col h-full fixed md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 sidebar-transition z-40 overflow-y-auto">
    
    <div class="p-5 border-b border-zinc-800 flex items-center gap-3">
      <div class="w-9 h-9 bg-sky-600 rounded-2xl flex items-center justify-center font-bold text-lg">C</div>
      <h1 class="text-2xl font-semibold">Chatty</h1>
    </div>

    <!-- Username Setup -->
    <div class="p-5 border-b border-zinc-800">
      <input id="usernameInput" type="text" placeholder="Your username" 
             class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-sky-500">
      <button onclick="setUsername()" 
              class="mt-3 w-full bg-sky-600 hover:bg-sky-500 py-3 rounded-2xl text-sm font-medium">Set Username & Continue</button>
    </div>

    <!-- Global Chat -->
    <div onclick="switchRoom('global')" class="mx-5 mt-4 px-5 py-4 hover:bg-zinc-800 rounded-2xl cursor-pointer flex items-center gap-4 bg-emerald-950">
      <span class="text-3xl">🌐</span>
      <div>
        <div class="font-semibold">Global Chat</div>
        <div class="text-xs text-emerald-400">Public</div>
      </div>
    </div>

    <!-- Servers -->
    <div class="p-5">
      <div class="flex justify-between items-center mb-3">
        <span class="text-xs uppercase tracking-widest text-zinc-500">Your Servers</span>
        <button onclick="createServer()" class="text-sky-400 text-xl leading-none">+</button>
      </div>
      <div id="serversList" class="space-y-1"></div>
    </div>

    <!-- Friends -->
    <div class="px-5 mt-4">
      <div class="text-xs uppercase tracking-widest text-zinc-500 mb-3">Friends</div>
      <div class="flex gap-2">
        <input id="addFriend" placeholder="Add friend" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
        <button onclick="addFriend()" class="bg-zinc-700 hover:bg-zinc-600 px-5 rounded-2xl">Add</button>
      </div>
      <div id="friendsList" class="mt-4 space-y-1"></div>
    </div>

    <div class="mt-auto p-5 border-t border-zinc-800">
      <button onclick="showAdminPanel()" 
              class="w-full py-3 bg-red-600/10 hover:bg-red-600/20 text-red-400 rounded-2xl text-sm font-medium">🔧 Admin Tools</button>
    </div>
  </div>

  <!-- Mobile Overlay -->
  <div id="sidebarOverlay" onclick="toggleSidebar()" class="hidden md:hidden fixed inset-0 bg-black/60 z-30"></div>

  <!-- Main Chat -->
  <div class="flex-1 flex flex-col">
    <div class="h-16 bg-zinc-900 border-b border-zinc-800 flex items-center px-6 md:px-8 justify-between">
      <div id="roomTitle" class="font-semibold text-xl">Global Chat</div>
      <div class="flex items-center gap-4">
        <div id="currentUserDisplay" class="text-sm text-zinc-400"></div>
        <button id="inviteBtn" onclick="inviteToServer()" class="hidden bg-zinc-700 hover:bg-zinc-600 px-4 py-1.5 rounded-xl text-sm">Invite</button>
      </div>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-6 md:p-8 space-y-6 messages bg-zinc-950"></div>

    <div class="p-6 bg-zinc-900 border-t border-zinc-800">
      <div class="flex gap-3">
        <input id="messageInput" type="text" placeholder="Type a message..." 
               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 focus:outline-none focus:border-sky-500"
               onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" class="bg-sky-600 hover:bg-sky-500 px-10 rounded-3xl font-medium">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div id="overlay" class="hidden fixed inset-0 bg-black/70 z-50"></div>
<div id="adminModal" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-lg p-8 z-50">
  <h2 class="text-2xl font-semibold mb-6">🔧 Admin Panel</h2>
  
  <div class="mb-6">
    <p class="text-sm text-zinc-400 mb-2">Enter Admin Password</p>
    <input id="adminPass" type="password" placeholder="••••••••" 
           class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-red-500">
  </div>

  <button onclick="verifyAdmin()" class="w-full py-4 bg-red-600 hover:bg-red-500 rounded-2xl font-semibold mb-8">Unlock Admin Tools</button>

  <div id="adminContent" class="hidden">
    <label class="block text-sm text-zinc-400 mb-2">Select User</label>
    <select id="userDropdown" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-sm focus:outline-none"></select>

    <div class="mt-8 space-y-3">
      <button onclick="adminTimeout()" 
              class="w-full py-4 bg-amber-600 hover:bg-amber-700 rounded-2xl text-sm font-medium">Timeout User (5 minutes)</button>
      <button onclick="adminClearUserMessages()" 
              class="w-full py-4 bg-red-500 hover:bg-red-600 rounded-2xl text-sm font-medium">Clear All Messages from User</button>
      <button onclick="adminDeleteAllChats()" 
              class="w-full py-4 bg-red-700 hover:bg-red-800 rounded-2xl text-sm font-medium">🗑️ DELETE ALL CHATS IN THIS ROOM</button>
    </div>
  </div>

  <button onclick="hideAdminPanel()" class="mt-8 w-full text-zinc-400 hover:text-white py-3 text-sm">Close</button>
</div>

<script>
// ================== FIREBASE CONFIG ==================
const firebaseConfig = {
  apiKey: "AIzaSyB-dwq2yjLEUSNZ0UT5oq4-u_KXghysXfw",
  authDomain: "discord2-1ed09.firebaseapp.com",
  databaseURL: "https://discord2-1ed09-default-rtdb.firebaseio.com",
  projectId: "discord2-1ed09",
  storageBucket: "discord2-1ed09.firebasestorage.app",
  messagingSenderId: "856172729472",
  appId: "1:856172729472:web:fa00078f5968d3e30a0265"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;
let currentRoom = "global";
let isAdmin = false;
const ADMIN_PASSWORD = "112111";

const timeouts = new Map();   // username → expiration timestamp

// Mobile sidebar
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");
  sidebar.classList.toggle("-translate-x-full");
  overlay.classList.toggle("hidden");
}

function closeSidebarOnMobile() {
  if (window.innerWidth < 768) toggleSidebar();
}

// ================== USERNAME SETUP ==================
function setUsername() {
  const username = document.getElementById("usernameInput").value.trim();
  if (!username || username.length < 3) return alert("Username must be at least 3 characters");
  
  currentUser = username;
  document.getElementById("currentUserDisplay").textContent = "Logged in as " + currentUser;
  loadServers();
  alert("✅ Welcome, " + username + "!");
}

// ================== SERVERS & INVITE ==================
function createServer() {
  if (!currentUser) return alert("Please set your username first");
  const name = prompt("New server name?");
  if (!name) return;
  const serverId = "server_" + Date.now();
  db.ref("servers/" + serverId).set({
    name: name,
    owner: currentUser,
    members: { [currentUser]: true },
    createdAt: Date.now()
  }).then(() => {
    switchRoom(serverId);
    closeSidebarOnMobile();
  });
}

function loadServers() {
  const list = document.getElementById("serversList");
  list.innerHTML = "";
  db.ref("servers").once("value", snap => {
    snap.forEach(child => {
      const server = child.val();
      const serverId = child.key;
      const isMember = isAdmin || (currentUser && server.members && server.members[currentUser]);
      if (isMember) {
        const div = document.createElement("div");
        div.className = "px-5 py-3 hover:bg-zinc-800 rounded-2xl cursor-pointer flex items-center gap-3";
        div.innerHTML = `<span class="text-xl">🔒</span><span>${server.name}</span>`;
        div.onclick = () => { switchRoom(serverId); closeSidebarOnMobile(); };
        list.appendChild(div);
      }
    });
  });
}

function inviteToServer() {
  if (!currentRoom.startsWith("server_")) return alert("You must be inside a server");
  const usernameToInvite = prompt("Enter exact username to invite:");
  if (!usernameToInvite) return;
  db.ref(`servers/${currentRoom}/members/${usernameToInvite}`).set(true)
    .then(() => alert(`✅ ${usernameToInvite} added!`))
    .catch(() => alert("Failed to invite user."));
}

// ================== CHAT ==================
function switchRoom(roomId) {
  if (roomId === "global") {
    currentRoom = "global";
    document.getElementById("roomTitle").textContent = "Global Chat";
    document.getElementById("inviteBtn").classList.add("hidden");
    document.getElementById("messages").innerHTML = "";
    loadMessages();
    return;
  }

  db.ref("servers/" + roomId).once("value", snap => {
    const server = snap.val();
    if (!server) return alert("Server not found");

    const hasAccess = isAdmin || (currentUser && server.members && server.members[currentUser]);

    if (hasAccess) {
      currentRoom = roomId;
      document.getElementById("roomTitle").textContent = server.name;
      document.getElementById("inviteBtn").classList.toggle("hidden", !(isAdmin || currentUser === server.owner));
      document.getElementById("messages").innerHTML = "";
      loadMessages();
    } else {
      alert("Access denied.");
      switchRoom("global");
    }
  });
}

function sendMessage() {
  if (!currentUser) return alert("Please set your username first");

  // Check timeout
  if (timeouts.has(currentUser) && Date.now() < timeouts.get(currentUser)) {
    return alert("You are currently timed out and cannot send messages.");
  }

  const text = document.getElementById("messageInput").value.trim();
  if (!text) return;

  db.ref("chats/" + currentRoom).push({
    user: currentUser,
    text: text,
    timestamp: Date.now()
  });

  document.getElementById("messageInput").value = "";
}

function loadMessages() {
  const container = document.getElementById("messages");
  const ref = db.ref("chats/" + currentRoom);
  ref.off();

  ref.on("child_added", (snapshot) => {
    const msg = snapshot.val();
    if (!msg) return;

    const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    const div = document.createElement("div");
    div.className = `flex ${msg.user === currentUser ? 'justify-end' : 'justify-start'} group`;

    div.innerHTML = `
      <div class="${msg.user === currentUser ? 'bg-sky-600 text-white' : 'bg-zinc-800'} max-w-[70%] rounded-3xl px-6 py-3.5">
        <div class="text-xs opacity-75 mb-1">${msg.user} • ${time}</div>
        <div>${msg.text}</div>
      </div>
    `;

    if (isAdmin) {
      const delBtn = document.createElement("button");
      delBtn.className = "ml-3 mt-2 text-red-400 text-xl opacity-0 group-hover:opacity-100 transition";
      delBtn.textContent = "🗑";
      delBtn.onclick = () => {
        if (confirm("Delete this message?")) db.ref(`chats/${currentRoom}/${snapshot.key}`).remove();
      };
      div.appendChild(delBtn);
    }

    container.appendChild(div);
    div.scrollIntoView({ behavior: "smooth" });
  });
}

// ================== ADMIN PANEL (fully fixed) ==================
function showAdminPanel() {
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("adminModal").classList.remove("hidden");
  document.getElementById("adminContent").classList.add("hidden");
  document.getElementById("adminPass").value = "";
}

function verifyAdmin() {
  if (document.getElementById("adminPass").value === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById("adminContent").classList.remove("hidden");
    loadUsersForAdmin();
    loadServers();
    alert("✅ Admin mode activated – you can now moderate");
  } else {
    alert("❌ Wrong password");
  }
}

function hideAdminPanel() {
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("adminModal").classList.add("hidden");
}

function loadUsersForAdmin() {
  const dropdown = document.getElementById("userDropdown");
  dropdown.innerHTML = "<option value=''>Select a user...</option>";
  db.ref("chats/" + currentRoom).limitToLast(100).once("value", snap => {
    const users = new Set();
    snap.forEach(child => {
      const u = child.val().user;
      if (u) users.add(u);
    });
    users.forEach(u => {
      const opt = document.createElement("option");
      opt.value = u;
      opt.textContent = u;
      dropdown.appendChild(opt);
    });
  });
}

function adminTimeout() {
  const user = document.getElementById("userDropdown").value;
  if (!user) return alert("Select a user");
  timeouts.set(user, Date.now() + 5 * 60 * 1000);
  alert(user + " has been timed out for 5 minutes.");
}

function adminClearUserMessages() {
  const user = document.getElementById("userDropdown").value;
  if (!user) return alert("Select a user");
  if (!confirm("Delete ALL messages from " + user + "?")) return;

  db.ref("chats/" + currentRoom).once("value", snap => {
    snap.forEach(child => {
      if (child.val().user === user) child.ref.remove();
    });
  });
  alert("All messages from " + user + " have been deleted.");
}

// NEW: Remove ALL chats in the current room
function adminDeleteAllChats() {
  if (!confirm("⚠️ This will permanently delete EVERY message in this room. Are you sure?")) return;
  if (!confirm("FINAL WARNING – This cannot be undone. Delete all messages?")) return;

  db.ref("chats/" + currentRoom).remove()
    .then(() => {
      document.getElementById("messages").innerHTML = "";
      alert("✅ All messages in this room have been deleted.");
    })
    .catch(err => alert("Error: " + err.message));
}

// Friends
function addFriend() {
  const name = document.getElementById("addFriend").value.trim();
  if (!name) return;
  let friends = JSON.parse(localStorage.getItem("friends") || "[]");
  if (!friends.includes(name)) friends.push(name);
  localStorage.setItem("friends", JSON.stringify(friends));
  renderFriends();
}

function renderFriends() {
  const list = document.getElementById("friendsList");
  list.innerHTML = "";
  const friends = JSON.parse(localStorage.getItem("friends") || "[]");
  friends.forEach(f => {
    const div = document.createElement("div");
    div.className = "px-5 py-3 hover:bg-zinc-800 rounded-2xl cursor-pointer";
    div.textContent = f;
    div.onclick = () => { switchRoom("private_" + f); closeSidebarOnMobile(); };
    list.appendChild(div);
  });
}

// Init
window.onload = () => {
  renderFriends();
  loadServers();
  switchRoom("global");
};
</script>
</body>
</html>
